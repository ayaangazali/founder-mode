                   side:'#8a8f9e', road:'#33323f', stripe:'#f4c542' },
'THE MISSION':   { sky:['#2b1b4d','#7a2a5e','#d96a3b','#24182c'], far:'#3a2044', near:'#2a1a3e', win:'#ff9d5c',
                   star:'rgba(255,220,180,.4)',  fog:['rgba(255,180,120,.10)','rgba(255,200,150,.12)'],
                   side:'#a08898', road:'#3a2b3c', stripe:'#ff8f5c', bunting:1 },
'SAND HILL ROAD':{ sky:['#4a3160','#b8742c','#ffc45e','#2a2118'], far:'#4a3423', near:'#33241a', win:'#ffe9a0',
                   star:'rgba(255,215,120,.55)', fog:['rgba(255,205,110,.10)','rgba(255,220,140,.12)'],
                   side:'#c9b58a', road:'#40372a', stripe:'#ffd94a' },
'CEREBRAL VALLEY':{ sky:['#241a3f','#4a3a6e','#8a6aa0','#2a2440'], far:'#2e2450', near:'#201a38', win:'#7dffa0',
                   star:'rgba(200,180,255,.45)', fog:['rgba(205,190,235,.25)','rgba(220,205,245,.30)'],
                   side:'#9a92b5', road:'#2e2a44', stripe:'#9dffb0', foggy:1 }, // GPU-green windows; heavy Karl
'THE CLOUD':     { sky:['#fbfcff','#e6ecf7','#b9c4de','#8f9fc6'], far:'', near:'', win:'',
                   star:'rgba(160,180,220,.35)', fog:['rgba(255,255,255,.30)','rgba(255,255,255,.40)'],
                   side:'#e8ecf5', road:'#c3cbe0', stripe:'', voidZone:1 }
};
const PICADO = ['#ff5d8f','#3dd6c3','#ffd94a','#b07fe8']; // Mission bunting flag cycle

function drawBG(){
  const B = BIOMES[zoneName(cam + W/2)];                       // zone by camera center
  const grd = cx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, B.sky[0]); grd.addColorStop(0.55, B.sky[1]); grd.addColorStop(0.8, B.sky[2]);
  grd.addColorStop(1, B.sky[3]);
  cx.fillStyle = grd; cx.fillRect(0, 0, W, H);
  // stars (SOMA) / warm specks (Mission) / gold motes (Sand Hill) / data specks (Cloud)
  cx.fillStyle = B.star;
  for (let i = 0; i < 24; i++){
    const sx = (i * 137 + 40) % W, sy = (i * 61) % 90;
    cx.fillRect(sx, sy, 1, 1); // steady — the sky doesn't flicker (owner call)
  }
  if (!B.voidZone){ // THE CLOUD: the city is gone
  // far skyline (parallax .25)
  const o1 = -(cam * 0.25) % 300;
  cx.fillStyle = B.far;
  for (let bx = o1 - 300; bx < W + 300; bx += 300){
    cx.fillRect(bx + 10, 130, 34, 110);
    // salesforce tower (rounded top-ish)
    cx.fillRect(bx + 60, 92, 26, 150); cx.fillRect(bx + 64, 84, 18, 10);
    cx.fillRect(bx + 100, 145, 40, 100);
    // transamerica pyramid
    for (let t = 0; t < 12; t++) cx.fillRect(bx + 160 + t, 100 + t * 4, 24 - t * 2, 4);
    cx.fillRect(bx + 210, 135, 30, 110);
    // sutro tower
    cx.fillRect(bx + 262, 78, 3, 60); cx.fillRect(bx + 274, 78, 3, 60); cx.fillRect(bx + 260, 96, 19, 3);
  }
  // near skyline (parallax .5) with lit windows
  const o2 = -(cam * 0.5) % 260;
  for (let bx = o2 - 260; bx < W + 260; bx += 260){
    cx.fillStyle = B.near;
    cx.fillRect(bx, 160, 50, 80); cx.fillRect(bx + 70, 140, 44, 100); cx.fillRect(bx + 130, 172, 60, 70); cx.fillRect(bx + 205, 150, 40, 90);
    cx.fillStyle = B.win;
    for (let wy = 0; wy < 5; wy++) for (let wx = 0; wx < 3; wx++)
      // seed windows from the building's WORLD tile, not the parallax float —
      // the old bx seed re-rolled every frame while scrolling (flickering city)
      if (((Math.round((bx + cam * 0.5) / 260) * 7 + wx * 13 + wy * 29) % 5 + 5) % 5 < 2)
        cx.fillRect(bx + 74 + wx * 12, 146 + wy * 16, 4, 5);
  }
  }
  // HUMOR PATCH item 4: the ROCKET GUY's launches — every ~45 sim-seconds behind
  // the Sand Hill skyline; every 10th one comes back down and LANDS (reusable).
  // He is never on screen. Only the rocket. (RISKY_CAMEOS)
  if (RISKY_CAMEOS){
    const rt = frame % 2700, launchN = Math.floor(frame / 2700);
    const sx = ROCKET_ANCHOR - cam * 0.5;
    if (sx > -20 && sx < W + 20){
      cx.fillStyle = '#3a3a4c'; cx.fillRect(Math.round(sx - 3), 138, 10, 3);   // the pad, always there
      const landing = launchN % 10 === 9;
      const drawRocket = (ry, flame) => {
        cx.fillStyle = '#e8ecf5'; cx.fillRect(Math.round(sx), Math.round(ry), 4, 9);
        cx.fillStyle = '#c0402a'; cx.fillRect(Math.round(sx + 1), Math.round(ry - 3), 2, 3);
        cx.fillStyle = flame; cx.fillRect(Math.round(sx + 1), Math.round(ry + 9), 2, 4);
      };
      if (rt < 220){                                            // ascent
        drawRocket(134 - (rt / 220) * 170, frame % 4 < 2 ? '#ff8c37' : '#ffd94a');
        if (frame % 3 === 0){ cx.fillStyle = 'rgba(220,220,230,.5)'; cx.fillRect(Math.round(sx - 1 + (frame % 5)), Math.round(147 - (rt / 220) * 170), 2, 2); }
      } else if (landing && rt < 440){                          // the 1-in-10 comeback
        drawRocket(-36 + ((rt - 220) / 220) * 170, frame % 4 < 2 ? '#7ce0ff' : '#fff');
      } else if (landing && rt < 700){                          // stuck the landing
        cx.fillStyle = '#e8ecf5'; cx.fillRect(Math.round(sx), 128, 4, 9);
        cx.fillStyle = '#c0402a'; cx.fillRect(Math.round(sx + 1), 125, 2, 3);
      }
    }
  }
  if (B.bunting){ // THE MISSION: papel picado strung between the near buildings, parallax .5
    const o3 = -(cam * 0.5) % 64;
    for (let bx = o3 - 64; bx < W + 64; bx += 64){
      cx.fillStyle = 'rgba(20,12,24,.8)'; cx.fillRect(bx, 88, 64, 1);                    // wire
      for (let f = 0; f < 4; f++){ cx.fillStyle = PICADO[f];
        cx.fillRect(bx + 6 + f*15, 89, 7, 5); cx.fillRect(bx + 8 + f*15, 94, 3, 2); }    // flag + cut-paper tail
    }
  }
  // Karl the Fog (recolored per zone)
  const fx = (frame * 0.2) % (W + 200) - 100;
  cx.fillStyle = B.fog[0];
  cx.fillRect(0, 110, W, 26);
  cx.fillStyle = B.fog[1];
  cx.fillRect(fx - 60, 104, 200, 20); cx.fillRect(fx + 180, 116, 160, 16);
  if (B.foggy){ cx.fillStyle = B.fog[0]; cx.fillRect(0, 60, W, 20); cx.fillRect(0, 140, W, 34); } // Cerebral Valley only
  // golden gate towers near the finale (world-anchored)
  // anchor 7700 = the war-room's 6000 fix + the +1700 world shift. (The level file's
  // CODE_UPDATES said 8600 — that predates the war-room finding and would need
  // cam>9435 with cam now clamped at 8720: unreachable dead code again. 7700 keeps
  // the bridge sweeping across the finale, red against the void.)
  const ggx = 7700 - cam * 0.85;
  if (ggx > -300 && ggx < W + 100){
    cx.fillStyle = '#c0402a';
    cx.fillRect(ggx, 70, 10, 170); cx.fillRect(ggx - 6, 88, 22, 6); cx.fillRect(ggx - 6, 130, 22, 6);
    cx.fillRect(ggx + 150, 70, 10, 170); cx.fillRect(ggx + 144, 88, 22, 6); cx.fillRect(ggx + 144, 130, 22, 6);
    cx.strokeStyle = '#c0402a'; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(ggx - 80, 120); cx.quadraticCurveTo(ggx + 80, 190, ggx + 155, 74); cx.stroke();
  }
}

function fmtMoney(k){ return k >= 1000 ? '$' + (k/1000).toFixed(2) + 'M' : '$' + k + 'K'; }
function fmtTime(ms){ const s = Math.floor(ms/1000); return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }

// ------------------------- DRAW -------------------------
function draw(){
  tcx.clearRect(0, 0, tv.width, tv.height); // text overlay redraws with every frame
  // hurt juice: 2-frame camera shake
  if (shakeT > 0 && state === ST.PLAY){ cx.translate(frame % 2 ? 2 : -2, 0); shakeT--; }

  drawBG();

  if (state === ST.TITLE){ cx.setTransform(1, 0, 0, 1, 0, 0); drawTitle(); return; }

  // HUMOR PATCH item 8: inside the hackathon house — full-frame interior
  if (state === ST.PLAY && room.active){
    px(0, 0, W, H, '#181322');                                    // 2am interior
    px(0, 232, W, H - 232, '#2a2338');                            // floor
    px(0, 0, W, 18, '#1f6feb');                                   // sponsor banner
    cx.font = 'bold 9px monospace'; cx.fillStyle = '#fff'; cx.textAlign = 'center';
    cx.fillText('SPONSORED BY OMNICORP CLOUD', W/2, 12);
    cx.textAlign = 'left';
    cx.font = 'bold 8px monospace'; cx.fillStyle = '#8d99ae';
    cx.fillText('HOUR 46 OF 48', 20, 40);
    const secs = Math.ceil(room.t / 60);
    cx.fillStyle = secs <= 4 && frame % 20 < 10 ? '#ff5a5a' : '#ffd94a';
    cx.font = 'bold 12px monospace';
    cx.fillText('DEMO IN ' + secs + 's', 350, 40);
    for (let f = 0; f < 3; f++){                                  // founders frozen mid-keystroke
      const fx = 70 + f * 110, fy = 196;
      px(fx + 14, fy + 14, 30, 6, '#3a2f4a');                     // desk
      px(fx + 20, fy + 4, 8, 10, '#2b2d42');                      // laptop lid
      px(fx + 21, fy + 5, 6, 8, '#41f2ff');                       // the glow that never sleeps
      drawFounder(cx, fx, fy + 4, 1, 1, 0, false,
        { skin:'#dba470', hair:'#3a2a1e', hairDk:'#2a1d14', hood:'#5d647a', pocket:'#4a5162', hairStyle:1 });
    }
    for (const c of room.cans){                                   // energy drinks = money now
      if (c.got) continue;
      const bob = Math.sin((frame + c.x) * 0.1) * 1.5;
      px(c.x, 216 + bob, 5, 9, '#9fe8b5'); px(c.x + 1, 215 + bob, 3, 1, '#e8ecf5');
    }
    px(414, 210, 40, 22, '#8a6d00'); px(418, 206, 32, 6, '#ffd94a'); // exit pedestal
    cx.font = 'bold 8px monospace'; cx.fillStyle = '#ffd94a';
    cx.fillText('DEMO →', 416, 202);
    drawFounder(cx, room.px, 208, 1, 1, (frame >> 3) % 2, false);  // you, hustling
    cx.setTransform(1, 0, 0, 1, 0, 0);
    return;
  }

  const B = BIOMES[zoneName(cam + W/2)]; // same lookup as drawBG — sky and ground flip together

  // signs — 8px face (was 6px): readable at 1x-2x window scales without leaving
  // the pixel grid; boards auto-fit the wider text
  cx.font = 'bold 8px monospace';
  for (const sg of signs){
    const x = sg.x - cam;
    if (x < -160 || x > W + 20) continue;
    const wmax = Math.max(...sg.l.map(t => cx.measureText(t).width)) + 8;
    px(x + 12, GROUND_Y - 26 - sg.l.length * 10, wmax, sg.l.length * 10 + 5, '#5d4a36');
    px(x + 12 + wmax/2 - 2, GROUND_Y - 22, 4, 22, '#4a3a2a');
    cx.fillStyle = '#ffe9b3';
    sg.l.forEach((t, i) => cx.fillText(t, Math.round(x + 16), Math.round(GROUND_Y - 22 - sg.l.length * 10 + i * 10 + 8)));
  }

  // HUMOR PATCH item 3: post-boss beat — Chad pivoted, posthumously. The sign
  // lights up behind his arena only once he's dead (so it never sits in a live
  // fight; the no-signs-in-arenas rule is about fights, not wakes).
  if (bosses[1].dead){
    const x = 6900 - cam;
    if (x > -160 && x < W + 20){
      cx.font = 'bold 8px monospace';
      const lines = ['CHAD CAPITAL', 'IS NOW CHAD.AI'];
      const wmax = Math.max(...lines.map(t => cx.measureText(t).width)) + 8;
      px(x + 12, GROUND_Y - 46, wmax, 25, '#221b2e');
      px(x + 12 + wmax/2 - 2, GROUND_Y - 22, 4, 22, '#4a3a2a');
      cx.fillStyle = frame % 40 < 20 ? '#41f2ff' : '#7ce0ff';       // freshly lit. of course it glows AI-blue.
      lines.forEach((t, i) => cx.fillText(t, Math.round(x + 16), Math.round(GROUND_Y - 46 + i * 10 + 9)));
    }
  }

  // ground
  for (const s of segs){
    const x0 = Math.max(s[0], cam - 4) - cam, x1 = Math.min(s[1], cam + W + 4) - cam;
    if (x1 < 0 || x0 > W) continue;
    if (B.voidZone){
      px(x0, GROUND_Y, x1 - x0, 6, B.side); px(x0, GROUND_Y + 6, x1 - x0, H - GROUND_Y, B.road);
    } else {
      px(x0, GROUND_Y, x1 - x0, 5, B.side);              // sidewalk
      px(x0, GROUND_Y + 5, x1 - x0, H - GROUND_Y, B.road); // asphalt
      cx.fillStyle = B.stripe;
      for (let lx = Math.floor((cam + x0) / 40) * 40; lx < cam + x1; lx += 40){
        const dx = lx - cam; if (dx > x0 && dx < x1 - 12) cx.fillRect(dx, GROUND_Y + 16, 12, 2); // road stripes
      }
    }
  }

  // FOG THICK TODAY: Karl sits on the street and the pits disappear (visual only)
  if (MK === 'fog' && state === ST.PLAY){
    cx.fillStyle = 'rgba(226,232,242,.5)';  cx.fillRect(0, GROUND_Y - 8, W, 22);
    cx.fillStyle = 'rgba(226,232,242,.75)'; cx.fillRect(0, GROUND_Y + 2, W, H - GROUND_Y);
  }

  // platforms
  for (const pl of plats){
    const x = pl[0] - cam; if (x < -pl[2] || x > W) continue;
    if (pl[0] > 7160){ // clouds
      px(x, pl[1], pl[2], 8, '#f2f5fc'); px(x + 4, pl[1] - 4, pl[2] - 8, 5, '#fff');
    } else { // crates
      px(x, pl[1], pl[2], 12, '#8a5a2b'); cx.strokeStyle = '#5e3c1a'; cx.lineWidth = 1;
      for (let bx2 = 0; bx2 < pl[2]; bx2 += 14) cx.strokeRect(x + bx2 + 0.5, pl[1] + 0.5, 13, 11);
    }
  }

  // HUMOR PATCH item 3: the FAILURE COACH — dies 3+ times at the same spot and
  // an athleisure guy materializes there, clapping. He is very proud of you.
  if (coachX !== null){
    const x = coachX - cam;
    if (x > -60 && x < W + 60){
      const y = GROUND_Y - 16, clap = (frame >> 4) % 2;
      px(x+3, y+0, 6, 2, '#d64550');                               // cap (backwards)
      px(x+3, y+2, 6, 4, '#e8c39a');                               // face
      px(x+5, y+3, 1, 1, '#111'); px(x+7, y+3, 1, 1, '#111');      // eyes, gleaming
      px(x+4, y+4, 4, 1, '#7a4a3a');                               // enormous grin
      px(x+2, y+6, 8, 7, '#39c46d');                               // athleisure quarter-zip
      if (clap){ px(x+5, y+7, 2, 2, '#e8c39a'); }                  // hands together
      else { px(x+1, y+7, 2, 2, '#e8c39a'); px(x+9, y+7, 2, 2, '#e8c39a'); } // hands apart
      px(x+2, y+13, 3, 3, '#2b2d42'); px(x+7, y+13, 3, 3, '#2b2d42');
      px(x+2, y+16, 3, 1, '#fff'); px(x+7, y+16, 3, 1, '#fff');    // pristine trainers
      if (Math.abs(player.x - coachX) <= 70 && state === ST.PLAY){
        cx.font = 'bold 8px monospace';
        const line = 'fail faster! this is great for you!';
        const tw = cx.measureText(line).width;
        const bx = clamp(x + 6 - tw/2 - 4, 2, W - tw - 10);
        px(bx, y - 30, tw + 8, 12, '#fff'); occlude(bx, y - 30, tw + 8, 12);
        px(bx + 6, y - 18, 4, 3, '#fff');
        cx.fillStyle = '#111'; cx.fillText(line, Math.round(bx + 4), Math.round(y - 20.5));
      }
    }
  }

  // HUMOR PATCH item 8: the hackathon house door (next to the HACKER HOUSE sign)
  {
    const x = ROOM_DOOR_X - 7 - cam;
    if (x > -30 && x < W + 30){
      px(x, GROUND_Y - 24, 14, 24, room.done ? '#241c30' : '#3a2f4a'); // the door
      px(x + 2, GROUND_Y - 22, 10, 20, room.done ? '#181322' : '#181322');
      if (!room.done){
        px(x + 3, GROUND_Y - 20, 8, 16, frame % 40 < 20 ? '#41f2ff' : '#2a6a7a'); // something's happening inside
        px(x + 10, GROUND_Y - 13, 2, 2, '#ffd94a');                               // handle
      }
      cx.font = 'bold 8px monospace'; cx.fillStyle = room.done ? '#5d647a' : '#9fe8b5';
      cx.fillText(room.done ? 'judging' : 'ENTER', Math.round(x - 2), Math.round(GROUND_Y - 28));
    }
  }

  // HUMOR PATCH item 9: THE VIBES CMO — ring light, tripod, permanent content
  {
    const x = 2500 - cam;
    if (x > -40 && x < W + 40){
      const y = GROUND_Y - 16;
      // the ring light (a square halo — pixel art forgives)
      px(x - 8, y - 4, 10, 1, '#fff2b0'); px(x - 8, y + 5, 10, 1, '#fff2b0');
      px(x - 8, y - 3, 1, 8, '#fff2b0'); px(x + 1, y - 3, 1, 8, '#fff2b0');
      px(x - 4, y + 6, 2, 10, '#5d647a');                        // tripod
      px(x + 6, y + 0, 6, 2, '#6b4a2e');                         // hair, effortless
      px(x + 6, y + 2, 6, 4, '#f2c9a0');                         // face, lit perfectly
      px(x + 7, y + 3, 1, 1, '#111');
      px(x + 5, y + 6, 8, 7, '#d9748f');                         // brand-color set
      px(x + 13, y + 7, 2, 3, '#39c46d');                        // iced matcha, of course
      px(x + 6, y + 13, 3, 3, '#e8e0c9'); px(x + 10, y + 13, 3, 3, '#e8e0c9');
      px(x + 6, y + 16, 3, 1, '#fff'); px(x + 10, y + 16, 3, 1, '#fff');
    }
  }
  // HUMOR PATCH item 9: the run-club laggard (the wave itself is v1.0; he IS the joke)
  {
    const lx = 3350 + Math.sin(frame * 0.012) * 45;              // forever behind the group
    const x = lx - cam;
    if (x > -40 && x < W + 40){
      const y = GROUND_Y - 15, step = (frame >> 3) % 2;
      px(x + 3, y, 6, 2, '#39c46d');                             // club cap (matching merch)
      px(x + 3, y + 2, 6, 4, '#e8c39a');
      px(x + 7, y + 3, 1, 1, '#111');                            // eye on the phone
      px(x + 2, y + 6, 8, 5, '#39c46d');                         // club tee
      px(x + 10, y + 7, 3, 4, '#0e1020'); px(x + 10, y + 7, 3, 1, '#41f2ff'); // the phone
      px(x + 3, y + 11, 3, 3 - step, '#2b2d42'); px(x + 7, y + 11, 3, 2 + step, '#2b2d42'); // jog. ish.
      px(x + 3, y + 14, 3, 1, '#fff'); px(x + 7, y + 14, 3, 1, '#fff');
      if (Math.abs(player.x - lx) <= 60 && state === ST.PLAY) celebBubble(x + 6, y, 'wait up. wait. guys.');
    }
  }

  // HUMOR PATCH item 6: CORGI CAFÉ — storefront under the Mission crates
  {
    const x = 2556 - cam;
    if (x > -100 && x < W + 40){
      px(x, GROUND_Y - 30, 78, 30, '#5a3d55');                   // façade
      px(x, GROUND_Y - 34, 78, 6, '#d9748f');                    // awning
      for (let a = 0; a < 5; a++) px(x + 4 + a * 15, GROUND_Y - 34, 8, 6, '#f4c6d3'); // awning stripes
      px(x + 6, GROUND_Y - 22, 26, 16, '#ffe9b3');               // warm window
      px(x + 10, GROUND_Y - 16, 6, 5, '#8a5a2b');                // a patron's coffee
      px(x + 44, GROUND_Y - 20, 14, 20, '#3a2a36');              // door
      cx.font = 'bold 8px monospace'; cx.fillStyle = '#ffe9b3';
      cx.fillText('CORGI CAFÉ', Math.round(x + 6), Math.round(GROUND_Y - 24));
    }
  }
  // the corgi itself (10x8, devastating) — never collides with anything, ever
  {
    const x = corgi.x - cam;
    if (x > -30 && x < W + 30){
      const y = GROUND_Y - 8;
      const trot = corgi.following && !corgi.sitting && (frame >> 3) % 2;
      px(x, y + (corgi.sitting ? 2 : 0), 8, 5, '#e8a04c');       // loaf
      px(x + (corgi.face > 0 ? 6 : -2), y - 2, 4, 4, '#e8a04c'); // head
      px(x + (corgi.face > 0 ? 6 : -2), y + 1, 4, 1, '#fff');    // snoot
      px(x + (corgi.face > 0 ? 8 : 0), y - 1, 1, 1, '#111');     // eye
      px(x + (corgi.face > 0 ? 6 : 1), y - 3, 1, 2, '#c77f33');  // ear
      px(x + (corgi.face > 0 ? 8 : 3), y - 3, 1, 2, '#c77f33');  // other ear
      px(x + (corgi.face > 0 ? -1 : 8), y + (frame % 10 < 5 ? 0 : 1), 1, 2, '#e8a04c'); // tail. always wagging.
      if (!corgi.sitting){                                       // stubs
        px(x + 1, y + 5, 1, 3 - (trot ? 1 : 0), '#c77f33'); px(x + 6, y + 5, 1, 3 - (trot ? 0 : 1), '#c77f33');
      }
      if (corgi.sitting && (frame >> 4) % 2) px(x + (corgi.face > 0 ? 10 : -3), y - 5, 2, 2, '#7ce0ff'); // waiting patiently
    }
  }

  // ---- HUMOR PATCH item 4: THE CELEBS (RISKY_CAMEOS) — draw-only; they never
  // touch collision, state, or any share surface ----
  if (RISKY_CAMEOS){
    { // PETER TEAL — end of Sand Hill, all black, chess pawn. Does not move. Moving is consensus.
      const x = 7100 - cam;
      if (x > -40 && x < W + 40){
        const y = GROUND_Y - 17;
        px(x+3, y+0, 6, 2, '#12141d');                             // severe hair
        px(x+3, y+2, 6, 4, '#e8c39a');                             // face
        px(x+4, y+3, 1, 2, '#111');                                // one eye. appraising.
        px(x+1, y+6, 10, 8, '#0b0c12');                            // all black, obviously
        px(x+2, y+14, 3, 2, '#0b0c12'); px(x+7, y+14, 3, 2, '#0b0c12');
        px(x+2, y+16, 3, 1, '#111'); px(x+7, y+16, 3, 1, '#111');
        px(x+14, y+11, 3, 2, '#e8ecf5'); px(x+15, y+8, 1, 3, '#e8ecf5'); px(x+14, y+7, 3, 1, '#e8ecf5'); // the pawn
        if (Math.abs(player.x - 7106) <= 60 && state === ST.PLAY) celebBubble(x + 6, y, 'COMPETITION IS FOR PEOPLE.');
      }
    }
    { // BARRY GAN — by the demo-day sign: cap, double thumbs-up, unstoppable
      const x = 4300 - cam;
      if (x > -40 && x < W + 40){
        const y = GROUND_Y - 16, up = (frame >> 4) % 2;
        px(x+3, y+0, 6, 2, '#3b5bdb'); px(x+9, y+0, 2, 1, '#3b5bdb'); // cap + bill
        px(x+3, y+2, 6, 4, '#e8c39a');
        px(x+4, y+3, 1, 1, '#111'); px(x+7, y+3, 1, 1, '#111');
        px(x+4, y+5, 4, 1, '#7a4a3a');                             // the grin
        px(x+2, y+6, 8, 7, '#f4f4f4');                             // crisp tee
        px(x+0, y+(up?4:6), 2, 3, '#e8c39a'); px(x+10, y+(up?4:6), 2, 3, '#e8c39a'); // double thumbs, pumping
        px(x+2, y+13, 3, 3, '#8d99ae'); px(x+7, y+13, 3, 3, '#8d99ae');
        px(x+2, y+16, 3, 1, '#fff'); px(x+7, y+16, 3, 1, '#fff');
        if (Math.abs(player.x - 4306) <= 70 && state === ST.PLAY){
          let line;
          if (barrySawIt){ line = '...OK MAYBE NOT LIKE THAT'; if (++barryShownT > 240) barrySawIt = false; }
          else line = ['YOU CAN JUST DO THINGS', 'SF IS BACK', 'BUILD BUILD BUILD'][Math.floor(playMs / 2500) % 3];
          celebBubble(x + 6, y, line);
        }
      }
    }
    { // SAM WALTMAN — outside the campus, gray tee. The sign says what it says.
      const x = 8420 - cam;
      if (x > -80 && x < W + 40){
        const y = GROUND_Y - 16;
        px(x+3, y+0, 6, 2, '#4a3626');
        px(x+3, y+2, 6, 4, '#e8c39a');
        px(x+4, y+3, 1, 1, '#111'); px(x+7, y+3, 1, 1, '#111');
        px(x+2, y+6, 8, 7, '#8d99ae');                             // gray tee
        px(x+1, y+6, 2, 5, '#5d647a');                             // backpack strap
        px(x+2, y+13, 3, 3, '#2b2d42'); px(x+7, y+13, 3, 3, '#2b2d42');
        px(x+2, y+16, 3, 1, '#111'); px(x+7, y+16, 3, 1, '#111');
        const txt = bosses[2].dead ? 'it knew me' : 'it knows me'; // two rects. devastating.
        cx.font = 'bold 8px monospace';
        const tw = cx.measureText(txt).width;
        px(x + 13, y + 2, tw + 6, 12, '#e8e0c9');                  // the tiny hand-held sign
        px(x + 12, y + 8, 1, 8, '#8a5a2b');
        cx.fillStyle = '#3a3a3a'; cx.fillText(txt, Math.round(x + 16), Math.round(y + 11));
      }
    }
  }

  // cameo sprites — background layer: everything gameplay draws on top of them
  for (const c of cameos) drawCameoSprite(c);

  // robotaxi — neutral rideable platform (sprites.js §4, s=1)
  {
    const tx = taxi.x - cam;
    if (tx > -40 && tx < W + 40){
      const ty = ROBOTAXI.top, stopped = taxi.stopT > 0;
      px(tx+12, ty-4, 6, 3, '#1b1e2c');                            // sensor dome
      px(tx+13+((frame>>3)%2)*2, ty-4, 2, 1, '#41f2ff');           // spinning highlight
      px(tx+14, ty-1, 2, 1, '#1b1e2c');                            // mast
      px(tx, ty+2, 30, 8, '#f4f6fb');                              // body
      px(tx+2, ty, 26, 4, '#f4f6fb');                              // cabin
      px(tx+4, ty+1, 8, 3, '#9fd7e8'); px(tx+14, ty+1, 8, 3, '#9fd7e8'); // windows (empty. always.)
      px(tx, ty+8, 30, 2, '#c9d2e4');                              // skirt
      px(tx+4, ty+10, 5, 4, '#1b1e2c'); px(tx+21, ty+10, 5, 4, '#1b1e2c'); // wheels
      px(tx+5, ty+11, 3, 2, '#4a5162'); px(tx+22, ty+11, 3, 2, '#4a5162');
      if (stopped && (frame>>4)%2){ px(tx+1, ty+4, 2, 2, '#ff8c37'); px(tx+27, ty+4, 2, 2, '#ff8c37'); } // hazards
    }
  }

  // SDK crates — falling lock-in / temporary platforms (sprites.js §5)
  for (const c of crates){
    const x = c.x - cam; if (x < -20 || x > W + 20) continue;
    px(x, c.y, 16, 12, '#8a5a2b');
    px(x+1, c.y+1, 14, 10, '#a06a34');
    px(x+1, c.y+5, 14, 1, '#8a5a2b');                              // strap
    px(x+3, c.y+3, 10, 6, '#fff');                                 // label
    cx.fillStyle = '#111'; cx.font = 'bold 5px monospace'; cx.fillText('SDK', Math.round(x+4), Math.round(c.y+8));
    if (c.landed && c.t < 90 && (frame>>3)%2) px(x+13, c.y+1, 2, 2, '#ffd94a'); // about to deprecate
  }

  // coins
  for (const c of coins){
    if (c.got) continue; const x = c.x - cam; if (x < -10 || x > W) continue;
    const bob = Math.sin((frame + c.x) * 0.08) * 1.5;
    px(x, c.y + bob, 8, 10, '#ffd94a'); px(x + 1, c.y + 1 + bob, 6, 8, '#ffc21a');
    cx.fillStyle = '#7a5c00'; cx.font = 'bold 7px monospace'; cx.fillText('$', Math.round(x + 2), Math.round(c.y + 8 + bob));
  }

  // powerups
  for (const pw of powers){
    if (pw.got) continue; const x = pw.x - cam; if (x < -16 || x > W) continue;
    const bob = Math.sin(frame * 0.1) * 2;
    if (pw.t === 'coffee'){
      px(x + 2, pw.y + bob, 9, 12, '#fff'); px(x + 3, pw.y + 2 + bob, 7, 6, '#6b4226');
      px(x + 11, pw.y + 3 + bob, 3, 5, '#fff'); px(x + 4, pw.y - 3 + bob, 1, 3, '#bbb'); px(x + 7, pw.y - 4 + bob, 1, 4, '#bbb');
    } else if (pw.t === 'yc'){
      // DEMO DAY LETTER: gold envelope, red rocket stamp, no letter glyphs (de-branded)
      px(x, pw.y + 3 + bob, 14, 9, '#e8b83a');                              // envelope body
      px(x, pw.y + 3 + bob, 14, 2, '#c2952a');                              // flap fold
      px(x + 1, pw.y + 4 + bob, 5, 2, '#c2952a'); px(x + 8, pw.y + 4 + bob, 5, 2, '#c2952a');
      px(x + 6, pw.y + 6 + bob, 2, 2, '#c2952a');                           // flap point
      px(x + 10, pw.y + 4 + bob, 4, 4, '#fff');                             // stamp
      px(x + 11, pw.y + 4 + bob, 1, 2, '#d64550');                          // rocket body
      px(x + 11, pw.y + 6 + bob, 2, 1, '#ff8c37');                          // flame
      const sh = (frame >> 2) % 28;
      if (sh < 10) px(x + 2 + sh, pw.y + 5 + bob, 1, 6, '#fff3c4');         // shine sweep
    } else if (pw.t === 'matcha'){
      // MATCHA: the calm counter-meta — glass, green tea, zen glow
      px(x + 2, pw.y + 2 + bob, 9, 10, '#e8f5ec');                          // glass
      px(x + 3, pw.y + 4 + bob, 7, 7, '#5da06b');                           // the matcha
      px(x + 3, pw.y + 4 + bob, 7, 1, '#8fd1a0');                           // foam line
      if ((frame >> 3) % 2) px(x + 5, pw.y - 2 + bob, 1, 2, '#9fe8b5');     // zen wisp
      px(x + 11, pw.y + 5 + bob, 2, 1, '#c9b18c');                          // bamboo whisk handle
    } else if (pw.t === 'contract'){
      // ENTERPRISE CONTRACT: big logo, heavy process
      px(x, pw.y + bob, 13, 15, '#fff');
      px(x + 1, pw.y + 1 + bob, 4, 4, '#1f6feb');                           // the big logo
      cx.fillStyle = '#888';
      for (let i = 0; i < 5; i++) cx.fillRect(Math.round(x + 2), Math.round(pw.y + 7 + i * 2 + bob), 9, 1);
      px(x + 8, pw.y + 12 + bob, 4, 2, '#c9a227');                          // the signature line, gilded
    } else if (pw.t === 'press'){
      // GOOD PRESS: a glowing newspaper — one bad take, absorbed
      px(x, pw.y + bob, 13, 10, '#e8ecf5');
      px(x + 1, pw.y + 1 + bob, 11, 2, '#111');                             // masthead
      cx.fillStyle = '#8d99ae';
      for (let i = 0; i < 3; i++) cx.fillRect(Math.round(x + 2), Math.round(pw.y + 5 + i * 2 + bob), 6, 1);
      px(x + 9, pw.y + 4 + bob, 3, 4, '#7ce0ff');                           // the flattering photo
      if ((frame >> 3) % 2) px(x - 1, pw.y - 1 + bob, 15, 1, 'rgba(124,224,255,.5)'); // press glow
    } else if (pw.t === 'deck'){
      // PITCH DECK: the founder's weapon, briefly
      px(x, pw.y + bob, 14, 10, '#7ce0ff');
      px(x + 1, pw.y + 1 + bob, 12, 8, '#0e2a3a');
      px(x + 2, pw.y + 2 + bob, 6, 1, '#7ce0ff');                           // title bar
      px(x + 2, pw.y + 4 + bob, 4, 4, '#ffd94a');                           // the chart goes up
      px(x + 8, pw.y + 5 + bob, 4, 1, '#7ce0ff'); px(x + 8, pw.y + 3 + bob, 3, 1, '#7ce0ff');
    } else if (pw.t === 'angel'){
      // ANGEL CHECK: a cheque with wings. it flaps.
      const wf = (frame >> 3) % 2;
      px(x + 2, pw.y + 3 + bob, 10, 6, '#fff');                             // the check
      px(x + 3, pw.y + 5 + bob, 6, 1, '#8d99ae');                           // payee line
      px(x + 9, pw.y + 6 + bob, 2, 2, '#7cffa5');                           // the number
      px(x - 1, pw.y + (wf ? 1 : 3) + bob, 3, 3, '#fff');                   // wings
      px(x + 12, pw.y + (wf ? 1 : 3) + bob, 3, 3, '#fff');
    } else if (pw.t === 'rug'){
      // RUG TOKEN: looks like a coin. glints slightly wrong.
      px(x, pw.y + bob, 8, 10, '#ffd94a'); px(x + 1, pw.y + 1 + bob, 6, 8, '#e0b81a');
      cx.fillStyle = '#7a5c00'; cx.font = 'bold 7px monospace'; cx.fillText('$', Math.round(x + 2), Math.round(pw.y + 8 + bob));
      if ((frame >> 2) % 6 < 2) px(x + 5, pw.y + 1 + bob, 2, 2, '#c58bff'); // the wrong glint
    } else {
      px(x, pw.y + bob, 12, 14, '#fff'); cx.fillStyle = '#888';
      for (let i = 0; i < 4; i++) cx.fillRect(Math.round(x + 2), Math.round(pw.y + 3 + i * 3 + bob), 8, 1);
      cx.fillStyle = '#1d9e50'; cx.font = 'bold 6px monospace'; cx.fillText('✓', Math.round(x + 3), Math.round(pw.y + 12 + bob));
    }
  }

  // enemies
  for (const e of enemies){ if (!e.dead && e.x - cam > -30 && e.x - cam < W + 30) drawEnemy(e); }

  // HUMOR PATCH item 5: MEETLY.AI — floats in Chad's arena corner "taking notes".
  // Invincible. Does nothing. That's the product.
  if (bosses[1].active && !bosses[1].dead){
    const mx = bosses[1].wall - 34 - cam, my = 148 + Math.sin(frame * 0.06) * 3;
    if (mx > -20 && mx < W + 20){
      px(mx + 2, my, 8, 3, '#aab4c4');                           // the clip, upper bend
      px(mx, my + 3, 3, 8, '#aab4c4'); px(mx + 9, my + 3, 3, 6, '#aab4c4');
      px(mx + 2, my + 11, 8, 3, '#cfd6e4');                      // lower bend
      px(mx + 4, my + 5, 4, 4, '#2b2d42');                       // face plate
      px(mx + 5, my + 6, 2, 2, '#41f2ff');                       // one wide eye
      if (frame % 30 < 15) px(mx + 11, my - 2, 2, 2, '#ff5a5a'); // REC. always REC.
      if (frame % 20 < 10) px(mx + 5, my + 15, 2, 1, '#8d99ae'); // scribble particles
    }
  }
  // the ACTION ITEMS — a paper stack with a lanyard and your name on everything
  if (actionItems){
    const ax = actionItems.x - cam, ay = actionItems.y;
    if (ax > -40 && ax < W + 40){
      px(ax, ay + 4, 20, 12, '#f4f4f4');
      px(ax + 1, ay + 6, 18, 1, '#8d99ae'); px(ax + 1, ay + 9, 14, 1, '#8d99ae');
      px(ax + 1, ay + 12, 16, 1, '#8d99ae');                     // dense, unread
      px(ax + 2, ay + 2, 16, 3, '#e8ecf5');                      // the stack continues upward
      px(ax + 8, ay - 1, 4, 4, '#d64550');                       // URGENT sticker
      cx.font = 'bold 8px monospace';
      const tw = cx.measureText('ACTION ITEMS').width;
      cx.fillStyle = 'rgba(0,0,0,.55)'; cx.fillRect(Math.round(ax + 10 - tw/2 - 2), Math.round(ay - 14), tw + 4, 11);
      occlude(ax + 10 - tw/2 - 2, ay - 14, tw + 4, 11);
      cx.fillStyle = '#ff5a5a'; cx.fillText('ACTION ITEMS', Math.round(ax + 10 - tw/2), Math.round(ay - 5));
    }
  }

  // HUMOR PATCH item 7: the slop clones — deliberately wrong copies of the boss.
  // The tell: the REAL one is drawn correctly. Spotting real vs slop is the joke
  // AND the mechanic.
  for (const sl of slops){
    const x = sl.x - cam; if (x < -30 || x > W + 30) continue;
    const jit = sl.real ? 0 : Math.round(Math.sin(sl.wob * 3)) ; // slop shimmers wrong
    const body = sl.real ? '#23263a' : '#2a3a2e';
    const head = sl.real ? '#2e3350' : '#3a4a3e';
    const glow = sl.real ? '#41f2ff' : '#8fd18f';
    px(x + jit, sl.y + 4, 16, 15, body);
    px(x + 2 + jit, sl.y, 12, 6, head);
    px(x + 4 + jit, sl.y + 2, 3, 2, glow);                                   // eye one
    px(x + 9 + jit, sl.y + 2 + (sl.real ? 0 : 1), 3, 2, glow);               // eye two (slop: misaligned)
    cx.fillStyle = glow; cx.font = 'bold 6px monospace';
    cx.fillText(sl.real ? 'AI' : sl.lbl, Math.round(x + 5 + jit), Math.round(sl.y + 14));
    px(x + 1 + jit, sl.y + 19, 5, 3, sl.real ? '#181a29' : '#243026');       // treads
    px(x + 10 + jit, sl.y + 19, 5, 3, sl.real ? '#181a29' : '#243026');
  }

  // bosses
  for (const b of bosses){
    if (b.dead) continue;
    if (b.x - cam > -60 && b.x - cam < W + 60) drawBoss(b);
    if (b.active && !b.dead){ // arena wall: a red velvet rope / server rack
      const wx = b.wall - cam;
      px(wx, GROUND_Y - 40, 6, 40, '#3a3f52');
      for (let i = 0; i < 5; i++) px(wx + 1, GROUND_Y - 36 + i * 8, 4, 2, frame % 20 < 10 ? '#41f2ff' : '#20505a');
    }
  }

  // IPO bell
  if (bosses[2].dead){
    const bx = 9130 - cam;
    if (bx > -40 && bx < W + 40){
      px(bx, GROUND_Y - 14, 26, 14, '#6b4f2a');
      const gold = frame % 20 < 10 ? '#ffd94a' : '#ffea8a';
      px(bx + 6, GROUND_Y - 34, 14, 16, gold); px(bx + 3, GROUND_Y - 20, 20, 4, gold);
      px(bx + 11, GROUND_Y - 16, 4, 4, '#8a6d00');
      cx.fillStyle = '#fff'; cx.font = 'bold 6px monospace'; cx.fillText('IPO', Math.round(bx + 6), Math.round(GROUND_Y - 24));
      cx.fillText('→ RING IT', Math.round(bx - 8), Math.round(GROUND_Y - 44));
    }
  }

  // shots
  for (const s of shots){
    const x = s.x - cam;
    if (s.t === 'sheet'){
      px(x, s.y, 12, 10, '#fff');
      cx.fillStyle = '#999'; for (let i = 0; i < 3; i++) cx.fillRect(Math.round(x + 1), Math.round(s.y + 3 + i * 2), 10, 1);
      cx.font = 'bold 6px monospace';
      const tw = cx.measureText('TERMS').width;
      cx.fillStyle = 'rgba(0,0,0,.55)'; cx.fillRect(Math.round(x - 2), Math.round(s.y - 10), tw + 4, 9);
      occlude(x - 2, s.y - 10, tw + 4, 9);
      cx.fillStyle = '#fff'; cx.fillText('TERMS', Math.round(x), Math.round(s.y - 3));
    } else if (s.t === 'thread'){
      // THREAD bomb: white card, red header (sprites.js §2)
      px(x, s.y, 14, 9, '#fff');
      px(x, s.y, 14, 2, '#d64550');
      cx.fillStyle = '#111'; cx.font = 'bold 5px monospace';
      cx.fillText('1/9', Math.round(x + 3), Math.round(s.y + 7));
    } else if (s.t === 'deck'){
      // the founder's own flying slide deck
      px(x, s.y, 14, 9, '#7ce0ff');
      px(x + 1, s.y + 1, 12, 7, '#0e2a3a');
      px(x + 2, s.y + 2, 6, 1, '#7ce0ff');                        // title bar
      px(x + 2, s.y + 4, 4, 3, '#ffd94a');                        // the chart goes up
      px(x + 7, s.y + 5, 5, 1, '#7ce0ff'); px(x + 7, s.y + 3, 3, 1, '#7ce0ff');
    } else {
      // pill drawn to fit the word at the readable 8px face — drawn box >= the
      // unchanged 26x9 collision AABB on ALL sides (item 31 rule: visual >= hitbox)
      cx.font = 'bold 8px monospace';
      const tw = cx.measureText(s.label).width;
      const pw2 = Math.max(s.w, tw + 8);
      px(x + s.w/2 - pw2/2, s.y - 2, pw2, s.h + 4, '#d64550');
      cx.fillStyle = '#fff'; cx.fillText(s.label, Math.round(x + s.w/2 - tw/2), Math.round(s.y + 6));
    }
  }

  // player (flash when hurt / rainbow-ish when YC)
  if (!(player.hurtT > 0 && frame % 6 < 3)){
    if (player.shield > 0){ // GOOD PRESS bubble: a thin ring of favorable coverage
      cx.strokeStyle = frame % 20 < 10 ? '#7ce0ff' : 'rgba(124,224,255,.4)';
      cx.lineWidth = 1;
      cx.strokeRect(Math.round(player.x - cam - 3) + 0.5, Math.round(player.y - 3) + 0.5, player.w + 6, player.h + 6);
    }
    drawFounder(cx, player.x - cam, player.y, 1, player.face, player.runFrame, player.ycT > 0 && frame % 8 < 5);
    if (player.coffeeT > 0 && frame % 5 === 0) parts.push({x:player.x - 2 + Math.random()*4, y:player.y + 14, vx:-player.face, vy:-0.5, t:14, c:'#c58bff'});
  }

  // particles
  for (const q of parts) px(q.x - cam, q.y, 2, 2, q.c);

  // mood meter — top-center under the zone name; deliberately ALSO drawn on the
  // death frame (spec: IT'S SO OVER lands on the obituary screenshot). The only
  // HUD element exempt from the end-screen blackout, by design.
  if (state === ST.PLAY || state === ST.DEAD){
    const m = MOODS[moodLock ? 5 : moodTier] || { t: 'FOUNDER MODE', c: '#ffd94a' };
    cx.font = 'bold 7px monospace';
    const mw = cx.measureText(m.t).width;
    cx.fillStyle = 'rgba(0,0,0,.45)'; cx.fillRect(Math.round(W/2 - mw/2 - 5), 22, Math.round(mw + 10), 11);
    occlude(W/2 - mw/2 - 5, 22, mw + 10, 11);
    cx.fillStyle = m.c;
    if (moodTier === 4 && frame % 8 < 3 && !moodLock) cx.fillStyle = '#ffd94a'; // deranged shimmer
    cx.fillText(m.t, Math.round(W/2 - mw/2), 30);
  }

  // popups + HUD only during play (end screens keep the frame clean behind the card)
  if (state === ST.PLAY){
    cx.font = 'bold 8px monospace'; // readable at 1-2x (playtest)
    for (const q of popups){
      cx.fillStyle = 'rgba(0,0,0,.55)';
      const tw = cx.measureText(q.txt).width;
      cx.fillRect(Math.round(q.x - cam - 2), Math.round(q.y - 9), tw + 4, 12);
      occlude(q.x - cam - 2, q.y - 9, tw + 4, 12);
      cx.fillStyle = q.c; cx.fillText(q.txt, Math.round(q.x - cam), Math.round(q.y));
    }
    for (const c of cameos) drawCameoBubble(c); // proximity dialogue, never hidden behind entities
    drawHUD();
  }
  // HUMOR PATCH item 9: the vertical-video frame — you've been content
  if (cmoT > 0 && state === ST.PLAY){
    cx.fillStyle = 'rgba(8,8,16,.82)';
    cx.fillRect(0, 0, 150, H); cx.fillRect(330, 0, 150, H);       // vertical crop
    cx.strokeStyle = '#fff'; cx.lineWidth = 2;
    cx.strokeRect(150.5, 4.5, 179, H - 9);
    cx.font = 'bold 8px monospace'; cx.fillStyle = '#fff'; cx.textAlign = 'center';
    cx.fillText('✨ day in my life as an obstacle ✨', 240, 22);
    cx.fillText('2.1M views · ♥ 402K', 240, H - 16);
    if (frame % 20 < 10){ cx.fillStyle = '#ff5a5a'; cx.fillRect(156, 10, 5, 5); }
    cx.textAlign = 'left';
  }

  // HUMOR PATCH item 5: the recap email — 2.5s of dimmed screen and assigned
  // blame. Drawn dead last: nothing outranks a calendar invite.
  if (meetlyT > 0 && state === ST.PLAY){
    cx.fillStyle = 'rgba(8,8,20,.72)'; cx.fillRect(0, 0, W, H);
    px(88, 64, 304, 128, '#f4f4f4');
    px(88, 64, 304, 22, '#3b5bdb');
    if (frame % 30 < 15) px(376, 70, 6, 6, '#ff5a5a');           // still recording, somehow
    cx.font = 'bold 9px monospace'; cx.fillStyle = '#fff';
    cx.fillText('MEETLY.AI HAS SENT THE RECAP', 96, 79);
    cx.font = 'bold 8px monospace'; cx.fillStyle = '#16130c';
    cx.fillText('Subject: Boss Fight — Recap & Action Items (47)', 98, 106);
    cx.fillText('All action items assigned to: YOU', 98, 126);
    cx.fillText('Next boss fight scheduled: now.', 98, 146);
    cx.fillStyle = '#8d99ae';
    cx.fillText('this meeting could have been an email. it is one now.', 98, 176);
  }
  cx.setTransform(1, 0, 0, 1, 0, 0); // undo hurt shake
}

function drawHUD(){
  // raised
  cx.fillStyle = 'rgba(0,0,0,.45)'; cx.fillRect(6, 6, 118, 30); occlude(6, 6, 118, 30);

function makeObituary(){
  const cause = OBIT_HEADLINES[deathCause] ? deathCause : 'burn';
  const headline = obitHeadline();
  const sub = OBIT_HEADLINES[cause].s;
  const INK = '#16130c', FAINT = '#4a4438', GREEK = '#c9c0aa', PAPER = '#ece5d3';
  const oc = document.createElement('canvas');
  oc.width = 1200; oc.height = 630;
  const b = oc.getContext('2d');
  b.imageSmoothingEnabled = false;
  b.fillStyle = PAPER; b.fillRect(0, 0, 1200, 630);
  b.textAlign = 'left';

  const wrap = (text, maxW) => { // word-wrap against the current font
    const words = text.split(' '), lines = [];
    let line = '';
    for (const w of words){
      const tryLine = line ? line + ' ' + w : w;
      if (b.measureText(tryLine).width > maxW && line){ lines.push(line); line = w; }
      else line = tryLine;
    }
    if (line) lines.push(line);
    return lines;
  };

  // masthead
  b.fillStyle = INK; b.fillRect(40, 16, 1120, 3);
  b.font = 'bold 56px monospace'; b.textAlign = 'center';
  b.fillText('HYPERGROWTH DAILY', 600, 70);
  b.fillRect(40, 84, 1120, 1);
  const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  b.font = 'bold 16px monospace'; b.textAlign = 'left'; b.fillStyle = FAINT;
  b.fillText(`${DAYS[_today.getDay()]}, ${MONTHS[_today.getMonth()]} ${_today.getDate()}, ${_today.getFullYear()} · "all signal, no revenue" · $8/mo`, 48, 106);
  b.textAlign = 'right';
  b.fillText('MARKETS: ' + MARKET.s.slice(0, 42), 1152, 106, 520);
  b.textAlign = 'left';
  b.fillStyle = INK; b.fillRect(40, 116, 1120, 4);

  // headline (shrink to fit) + subhead
  let hs = 46;
  b.font = `bold ${hs}px monospace`;
  while (hs > 26 && b.measureText(headline).width > 1112){ hs -= 2; b.font = `bold ${hs}px monospace`; }
  b.fillStyle = INK; b.fillText(headline, 44, 168);
  b.font = 'bold 21px monospace'; b.fillStyle = FAINT;
  b.fillText(sub, 46, 200, 1108);
  b.fillStyle = INK; b.fillRect(40, 214, 1120, 1);

  // two columns: 3 real lines each (seeded by the run), then greeked bars
  const i1 = Math.floor(quoteRoll * OBIT_BODY.length) % OBIT_BODY.length;
  const i2 = (i1 + 1 + Math.floor(quoteRoll * 3)) % OBIT_BODY.length === i1
           ? (i1 + 1) % OBIT_BODY.length : (i1 + 1 + Math.floor(quoteRoll * 3)) % OBIT_BODY.length;
  const rM = fmtMoney(raised), tM = fmtTime(endTime || playMs);
  b.font = 'bold 17px monospace';
  [[48, i1], [440, i2]].forEach(([cx2, bi]) => {
    b.fillStyle = INK;
    wrap(OBIT_BODY[bi](rM, tM), 356).slice(0, 3).forEach((ln, li) => b.fillText(ln, cx2, 246 + li * 25));
    b.fillStyle = GREEK;
    for (let g = 0; g < 6; g++) b.fillRect(cx2, 332 + g * 22, g % 3 === 2 ? 250 : 352, 12);
  });

  // the "photo": founder at 10x, tilted, framed, with caption
  b.strokeStyle = INK; b.lineWidth = 3;
  b.strokeRect(846, 232, 306, 262);
  b.save();
  b.beginPath(); b.rect(848, 234, 302, 258); b.clip();
  b.translate(999, 355); b.rotate(-0.055);
  drawFounder(b, -60, -85, 10, 1, 0, false);
  b.restore();
  b.font = 'bold 14px monospace'; b.fillStyle = FAINT; b.textAlign = 'center';
  b.fillText(OBIT_CAPTIONS[Math.floor(quoteRoll * 3) % 3], 999, 514, 300);
  b.textAlign = 'left';

  // pull quote
  b.fillStyle = INK; b.fillRect(48, 486, 8, 74);
  b.font = 'bold 30px monospace';
  b.fillText('"it was a market timing issue"', 72, 520, 720);
  b.font = 'bold 16px monospace'; b.fillStyle = FAINT;
  b.fillText('— you, on LinkedIn', 72, 550);

  // bottom ticker
  b.fillStyle = INK; b.fillRect(0, 592, 1200, 38);
  b.fillStyle = PAPER; b.font = 'bold 19px monospace';
  b.fillText(`RAISED ${rM} ▼ · RUNWAY 0.0 MONTHS ▼ · VIBES DELISTED · NEXT: YOUR RUN?`, 48, 617, 1104);
  return oc;
}

    const badgeBlob = surfaces[cur].blob;
    const ok = () => msg.textContent = 'post copied ✓ — now SAVE BADGE and attach it';
    const manual = () => { // last resort: visible readonly textarea, still shippable
      msg.textContent = 'copy blocked — select all + copy manually:';
      const ta = document.createElement('textarea');
      ta.value = text; ta.readOnly = true;
      ta.style.cssText = 'display:block; margin:6px auto 0; width:min(480px,80vw); height:88px; font:12px "Courier New",monospace;';
      msg.appendChild(ta); ta.focus(); ta.select();
    };
    const legacy = () => {
      try {
        const ta = document.createElement('textarea');
        ta.value = text; ta.setAttribute('readonly',''); ta.style.cssText = 'position:fixed; left:-9999px';
        document.body.appendChild(ta); ta.select();
        const done = document.execCommand('copy'); ta.remove();
        done ? ok() : manual();
      } catch(err){ manual(); }
    };
    if (navigator.clipboard && navigator.clipboard.writeText){
      let rich = null; // desktop: try text + badge image in one clipboard write
      if (!isTouch && navigator.clipboard.write && window.ClipboardItem && badgeBlob){
        try { rich = navigator.clipboard.write([new ClipboardItem({'image/png':badgeBlob, 'text/plain':new Blob([text], {type:'text/plain'})})]); } catch(err){}
      }
      (rich || navigator.clipboard.writeText(text)).then(ok, () => navigator.clipboard.writeText(text).then(ok, legacy));
    } else legacy(); // insecure contexts / webviews: navigator.clipboard is undefined
  };
  document.getElementById('bRe').onclick = () => resumePlay(!won);
}

// ------------------------- MAIN LOOP -------------------------
// fixed timestep: 60 sim-steps/s regardless of display refresh (120Hz phones, throttled tabs)
const STEP = 1000 / 60;
let last = 0, acc = 0;
function stepGame(){
  if (state === ST.TITLE && (JUMP()) && frame > 30){
    reset(false); state = ST.PLAY;
  }
  if (hitstopT > 0){ hitstopT--; return; } // hurt hitstop: freeze sim, keep drawing
  update();
}
function loop(now){
  acc += Math.min(now - (last || now), 100); last = now;
  while (acc >= STEP){ stepGame(); acc -= STEP; }
  draw();
  requestAnimationFrame(loop);
}
reset(false);
state = ST.TITLE;
requestAnimationFrame(loop);
</script>
