<script>
"use strict";
/* ============================================================
   FOUNDER MODE — a pixel platformer about surviving SF tech.
   One file. No assets. No frameworks. Ship it.
   ============================================================ */
// HUMOR PATCH item 4 — thin-veil celebrity cameos. Owner-approved (briefed 3x,
// owns the right-of-publicity call). One const flips them all off. They NEVER
// appear in makeBadge / makeObituary / shareText (grep-gated in qa/celebs-probe.js).
const RISKY_CAMEOS = true;
const W = 480, H = 270;
const cv = document.getElementById('game');
const cx = cv.getContext('2d');
cx.imageSmoothingEnabled = false;

// --- crisp text overlay: sprites stay chunky on #game; every fillText is
// mirrored onto #txt, a second canvas at native device resolution stacked on
// top (playtest: 8px glyphs at 2x read as blur; dialogue must be legible).
// cx.fillText is patched so all ~60 call sites get this for free — layout math
// (measureText, bubble boxes) still runs in 480×270 game units on cx.
const tv = document.getElementById('txt');
const tcx = tv.getContext('2d');
let TS = 2; // game-unit → overlay-pixel scale; set by fit()
cx.fillText = function(str, x, y){
  tcx.font = cx.font.replace(/(\d+(?:\.\d+)?)px/, (m0, n) => (parseFloat(n) * TS) + 'px');
  tcx.fillStyle = cx.fillStyle;
  tcx.textAlign = cx.textAlign;
  tcx.textBaseline = cx.textBaseline;
  // maxWidth pins the overlay run to the game-unit measure — layout boxes were
  // sized with cx.measureText, and font hinting drifts a few px over long lines
  tcx.fillText(str, (x + uiShakeX) * TS, (y + uiShakeY) * TS, cx.measureText(str).width * TS);
};
// overlay text stacks above ALL game pixels, so a bubble box drawn later can no
// longer hide text drawn earlier. every backing box calls this to punch out the
// overlay beneath it — restores draw-order occlusion for text.
function occlude(x, y, w, h){ tcx.clearRect(Math.round(x) * TS, Math.round(y) * TS, Math.ceil(w) * TS, Math.ceil(h) * TS); } // rounds like px() so punches align with boxes (audit)

// --- scale canvas to window, keep 16:9, integer-ish scale ---
// portrait on touch: non-blocking (ruling 2.1) — top-align canvas, buttons directly under it,
// dismissible in-fiction rotate prompt. never a wall, never an input pause.
let rotDismissed = false;
function fit() {
  // exact-fit scale (owner: integer flooring letterboxed up to a third of the
  // window in black — "why is it so zoomed out"). The floor existed to keep
  // upscaled 6px fonts crisp; text renders on the hi-res overlay now, so
  // fractional sprite scale costs only sub-pixel chunk irregularity.
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  cv.style.width  = Math.floor(W * s) + 'px';
  cv.style.height = Math.floor(H * s) + 'px';
  // size the text overlay to the same CSS box, backed at devicePixelRatio
  const dpr = window.devicePixelRatio || 1;
  TS = Math.floor(W * s) / W * dpr;
  tv.width  = Math.round(W * TS); tv.height = Math.round(H * TS);
  tv.style.width = cv.style.width; tv.style.height = cv.style.height;
  const isTouch = 'ontouchstart' in window;
  const portrait = isTouch && window.innerHeight > window.innerWidth;
  document.getElementById('wrap').style.alignItems = portrait ? 'flex-start' : 'center';
  for (const id of ['tL','tR','tJ']){
    const el = document.getElementById(id);
    if (portrait){ el.style.bottom = 'auto'; el.style.top = (Math.floor(H * s) + 14) + 'px'; }
    else { el.style.bottom = ''; el.style.top = ''; }
  }
  document.getElementById('rot').style.display = (portrait && !rotDismissed) ? 'block' : 'none';
}
window.addEventListener('resize', fit); fit();
// title-screen leaderboard panel (chip shows only on the title, like #credit)
document.getElementById('lbChip').addEventListener('click', () => {
  const panel = document.getElementById('lbPanel');
  panel.style.display = 'flex';
  document.getElementById('lbPanelHead').textContent = 'loading the cap tables…';
  document.getElementById('lbPanelList').innerHTML = '';
  lbLoad(100, (rows, label) => {
    document.getElementById('lbPanelHead').textContent = label + (rows.length ? ' · top ' + rows.length : '');
    document.getElementById('lbPanelList').innerHTML = rows.length ? lbRowsHtml(rows) : 'nobody yet. glory awaits.';
  });
});
document.getElementById('lbPanelClose').addEventListener('click', () => {
  document.getElementById('lbPanel').style.display = 'none';
});
document.getElementById('lbPanel').addEventListener('click', e => {
  if (e.target.id === 'lbPanel') document.getElementById('lbPanel').style.display = 'none';
});
document.getElementById('rot').addEventListener('touchstart', e => { e.preventDefault(); rotDismissed = true; fit(); }, {passive:false});
document.getElementById('rot').addEventListener('mousedown', () => { rotDismissed = true; fit(); });

// ------------------------- INPUT -------------------------
const keys = {};
let anyKeyPressed = false;
// Key normalization: not every browser reports the spec names — legacy engines
// and some layout/IME setups give 'Spacebar', 'Left'/'Up'/'Down'/'Right', 'Esc',
// or 'Process' instead of ' '/'ArrowLeft'/'Escape'. Letters are the only stable
// names, which is how a machine ends up with WASD+X working and nothing else.
// e.key wins when it parses (respects the user's layout); e.code is the
// physical-key fallback that never lies about nav keys.
const LEGACY2KEY = { ' ':'space', 'spacebar':'space', 'left':'arrowleft', 'right':'arrowright',
  'up':'arrowup', 'down':'arrowdown', 'esc':'escape' };
const CODE2KEY = { 'Space':'space', 'ArrowLeft':'arrowleft', 'ArrowRight':'arrowright',
  'ArrowUp':'arrowup', 'ArrowDown':'arrowdown', 'Escape':'escape' };
function normKey(e){
  const k = (e.key || '').toLowerCase();
  if (LEGACY2KEY[k]) return LEGACY2KEY[k];
  if (CODE2KEY[e.code]) return CODE2KEY[e.code];
  if ((!k || k === 'process' || k === 'dead' || k === 'unidentified') && /^Key[A-Z]$/.test(e.code || ''))
    return e.code.slice(3).toLowerCase(); // IME swallowed the letter; the physical key didn't
  return k;
}
const NAV_KEYS = ['arrowleft','arrowright','arrowup','arrowdown','space'];
window.addEventListener('keydown', e => {
  const nk = normKey(e);
  if (NAV_KEYS.includes(nk)) e.preventDefault();
  if (nk === 'escape' && state === ST.PLAY){ paused = !paused; return; }
  keys[nk] = true;
  anyKeyPressed = true;
  idleT = 0;
  initAudio();
  if (state === ST.TITLE){ // founder picker — edge-triggered, never starts the game
    const k = nk;
    if (k === 'c') cycleLook('s');
    else if (k === 'h') cycleLook('h');
    else if (k === 'v') cycleLook('v');
    else if (k === 'x') cycleLook('x');
    else if (k === 'p') cycleLook('p');
    // item 10 eggs: type CORGI / SLOP on the title (sticky for the session)
    if (k.length === 1 && k >= 'a' && k <= 'z'){
      typed = (typed + k).slice(-5);
      if (typed.endsWith('corgi')){ pendingCorgi = true; sPow(); }
      if (typed.endsWith('slop')){ pendingSlop = true; sPow(); }
    }
  }
  // the classic cheat-code sequence — tracked anywhere, never rendered in-game
  if (!konamiDone){
    const kk = nk;
    konamiIdx = kk === KONAMI[konamiIdx] ? konamiIdx + 1 : (kk === KONAMI[0] ? 1 : 0);
    if (konamiIdx >= KONAMI.length){
      konamiDone = true; moodLock = true;        // the meter reads FOUNDER MODE, permanently
      window.FOUNDER_LOOK = resolveLook();       // gray zip-up takes effect immediately
      beep(660, .3, 'square', .08);
    }
  }
  if (nk === 'x' && !e.repeat) throwDeck(); // only fires while holding a PITCH DECK
  if (nk === 'r' && !e.repeat && (state === ST.DEAD || state === ST.WIN)){
    resumePlay(state === ST.DEAD); // death retries from checkpoint; a win restart is a fresh run
  }
});
window.addEventListener('keyup', e => {
  keys[normKey(e)] = false;
});
// input hygiene: alt-tab / app-switch with a key held must not auto-run the founder
function clearAllInput(){ for (const k in keys) keys[k] = false; touch.L = touch.R = touch.J = false; }
window.addEventListener('blur', clearAllInput);
document.addEventListener('visibilitychange', () => { if (document.hidden) clearAllInput(); });
const L = () => keys['arrowleft'] || keys['a'] || touch.L;
const R = () => keys['arrowright'] || keys['d'] || touch.R;
const JUMP = () => keys['space'] || keys['arrowup'] || keys['w'] || touch.J;

// touch controls — one container handler; recompute L/R/J from every live touch point
// (handles thumb-slide between buttons, the gutter between them, and touchcancel) with 10px slop
const touch = { L:false, R:false, J:false };
if ('ontouchstart' in window) {
  const tEl = document.getElementById('touch');
  tEl.style.display = 'block';
  const recompute = e => {
    touch.L = touch.R = touch.J = false;
    const rects = ['tL','tR','tJ'].map(id => document.getElementById(id).getBoundingClientRect());
    for (const t of e.touches){
      rects.forEach((r, i) => {
        if (t.clientX >= r.left - 10 && t.clientX <= r.right + 10 && t.clientY >= r.top - 10 && t.clientY <= r.bottom + 10)
          touch[['L','R','J'][i]] = true;
      });
    }
  };
  for (const ev of ['touchstart','touchmove','touchend','touchcancel'])
    tEl.addEventListener(ev, e => { e.preventDefault(); anyKeyPressed = true; idleT = 0; initAudio(); recompute(e); }, {passive:false});
  document.getElementById('credit').style.right = '72px'; // clear of the ⏸ button on touch
  document.getElementById('tP').addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    if (state === ST.PLAY) paused = !paused;
  }, {passive:false});
  cv.addEventListener('touchstart', e => {
    e.preventDefault(); anyKeyPressed = true; idleT = 0; initAudio();
    if (state === ST.TITLE){
      const k = pickerHit(e.touches[0].clientX, e.touches[0].clientY);
      if (k){ cycleLook(k); return; }             // tap chip = cycle, not start
    }
    if (state !== ST.PLAY){ touch.J = true; setTimeout(() => touch.J = false, 120); }
    else throwDeck(); // in play, a canvas tap pitches — if you're holding a deck
  }, {passive:false});
}

// founder-picker tap/click zones (title screen) — generous padding for thumbs
const PICKER_ZONES = [
  { x:112, y:192, w:104, h:12, k:'s' },
  { x:112, y:206, w:104, h:12, k:'h' },
  { x:112, y:220, w:104, h:12, k:'v' },
  { x:112, y:234, w:104, h:12, k:'x' },
  { x:224, y:234, w:118, h:12, k:'p' },
];
function pickerHit(clientX, clientY){
  const r = cv.getBoundingClientRect();
  const mx = (clientX - r.left) * W / r.width;
  const my = (clientY - r.top)  * H / r.height;
  for (const z of PICKER_ZONES)
    if (mx > z.x - 8 && mx < z.x + z.w + 8 && my > z.y - 5 && my < z.y + z.h + 5)
      return z.k;
  return null;
}
cv.addEventListener('mousedown', e => {
  idleT = 0;
  if (state !== ST.TITLE) return;
  const k = pickerHit(e.clientX, e.clientY);
  if (k) cycleLook(k);
});

// ------------------------- AUDIO -------------------------
let AC = null, muted = false;
function initAudio(){ if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } }
function beep(freq, dur, type='square', vol=0.08, slide=0) {
  if (!AC || muted) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide), AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime+dur);
}
const sJump  = () => beep(300, .18, 'square', .06, 260);
const sCoin  = () => { beep(880,.07,'square',.06); setTimeout(()=>beep(1320,.12,'square',.06),60); };
const sStomp = () => beep(180, .12, 'triangle', .12, -120);
const sHurt  = () => beep(160, .3, 'sawtooth', .09, -110);
const sPow   = () => { [440,554,659,880].forEach((f,i)=>setTimeout(()=>beep(f,.1,'square',.07),i*70)); };
const sBoss  = () => beep(80, .5, 'sawtooth', .1, -30);
const sWin   = () => { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,.22,'square',.08),i*130)); };
window.addEventListener('keydown', e => { if (normKey(e)==='m') muted = !muted; });

// ------------------------- HELPERS -------------------------
const clamp = (v,a,b) => v<a?a:(v>b?b:v);
const aabb = (a,b) => a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
// mini-game urgency shake: a draw-only offset consumed by px() and the text
// overlay, so the whole dialogue judders as the clock runs out. Set per frame
// inside drawChat/drawInterview and always reset to 0 — the sim never reads it.
let uiShakeX = 0, uiShakeY = 0;
function px(x,y,w,h,c){ cx.fillStyle=c; cx.fillRect(Math.round(x+uiShakeX),Math.round(y+uiShakeY),w,h); }

// ------------------------- LEVEL DATA -------------------------
const GROUND_Y = 232;
// v1.0 WORLD STRETCH (design/level-cerebral-valley.js): CEREBRAL VALLEY inserted at
// the x=3956 pit; every original x >= 3956 shifted +1700. Traction gate opened by
// owner decision 2026-07-11. Physics constants untouched; level LENGTH is a
// speedrun-contract change — version note appended to qa/CHANGELOG.md.
const LEVEL_W = 9200;

// ground segments [x0, x1] — gaps between are pits (all pits <= 60px, validated)
const segs = [
  [0,780],[822,1420],[1468,2350],[2402,2980],[3036,3900],
  // CEREBRAL VALLEY. First pit narrowed 4420→4432 (was 60px = the exact base-
  // speed jump maximum, a ~1px landing window — measured frame-perfect, i.e.
  // unfair; now 48px like the zone's other pits)
  [3956,4432],[4480,4900],[4948,5320],[5372,5656],
  [5656,6300],[6344,7150],[7204,8000],[8052,9200]
];

// floating platforms [x, y, w]  (crates / scaffolding / clouds)
// §E reachability fixes applied (level-cerebral-valley.js): 3290→3260 and the
// shifted 4250→5918 close 84/86px gaps to 54; the two y:168 plats drop to 174
// (rise 64 > 62px jump apex). "100% coins" is now actually possible.
// CV stack-1 base nudged 4050→4070 to clear the zone sign (step gaps stay <=48).
// Post-solid-undersides reachability pass (playtest: "some jumps are impossible" —
// confirmed by audit; the old jump-up-THROUGH-the-platform routes died with the
// bonk physics): 420→410 and 1060→1070 close 64px frame-perfect lateral hops to
// 54; 2550 and 3700 rise to y176 (their tops sat at/past the exact jump apex).
const plats = [
  [300,190,56],[410,152,56],[560,190,56],
  [900,182,72],[1070,146,56],[1180,182,56],
  [1650,178,64],
  [2050,184,56],[2170,148,56],[2280,184,56], // 2290→2280: crate ended 4px before the pit lip — solid undersides made lip jumps bonk into the pit
  [2550,176,88],
  [3150,182,56],[3260,150,56],[3430,182,56],

// The calendar date is the ONLY wall-clock read in the game (a daily seed is date-
// derived by definition); every timer below still runs on frames / playMs.
function mulberry32(a){
  return function(){ a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296; };
}

                          - Date.UTC(2026, 0, 1)) / 86400000) + 1;  // seed #1 = 2026-01-01
const dailyRng = mulberry32(SEED_N);

  const tenx = interns.findIndex(i2 => i2.id === 'tenx');
  if (tenx >= 0){                  // the 10X intern tanks exactly one hit, then renegotiates
    interns.splice(tenx, 1);
    player.hurtT = 90; shakeT = 2; sHurt();
    addPop(player.x, player.y - 24, 'your 10X intern took the hit', '#7ce0ff', 160);
    addPop(player.x, player.y - 12, '"can I get equity? a title? to lead eng?" — quit', '#8d99ae', 220);
    return;
  }
  if (cause) deathCause = cause;   // the last thing that hurt you writes the headline
  if (word) deathWord = word;
  moodDown();                      // one hit = IT'S SO OVER, instantly
  if (corgi.following){ corgi.sitting = true; corgi.sitT = 45; } // the corgi sits and waits for you
  hearts--;
  sHurt();
  player.hurtT = 90;
  player.vy = -4; player.vx = -player.face * 3;
  shakeT = 2; hitstopT = 3; // juice only — control stays with the player (ruling 2.2)
  addPop(player.x, player.y-10, '-1 RUNWAY', '#ff5a5a');
  if (hearts <= 0){
    if (momRound()) return;         // 📞 once per run, the seed round comes through
    endTime = playMs;
    recordDeathSpot(player.x);
    state = ST.DEAD;
    showEndUI(false);
  }
}

// B3: THE MOM ROUND. On hitting 0 RUNWAY — once per run — a beat, a phone
// call, +2 RUNWAY. Guaranteed if MOM is your cofounder, else a 1-in-6 roll
// (quoteRoll: fixed per run, so a retry can't fish for it mid-run).
function tickPowers(){ // buffs don't park while the world is paused for a mini-game (audit)
  for (const k of ['ycT', 'deckT', 'coffeeT', 'matchaT', 'slowT'])
    if (player[k] > 0) player[k]--;
}
function momRound(){
  // the 1-in-6 path needs a run worth saving (>20s) — also keeps the QA
  // suites' die-on-purpose probes deterministic. MOM-as-cofounder always calls.
  if (momRoundUsed || !(cof().id === 'mom' || (momRoll < 1/6 && playMs > 20000))) return false;
  momRoundUsed = true; momBacked = true;
  hearts = 2; maxHearts = Math.max(maxHearts, 2);
  hitstopT = 72;                                   // the 1.2s beat — the world holds its breath
  addPop(player.x, player.y - 36, '📞 INCOMING: MOM', '#fff', 220);
  addPop(player.x, player.y - 24, 'YOUR MOM LED YOUR SEED ROUND', '#ffd94a', 220);
  addPop(player.x, player.y - 12, '+2 RUNWAY · "I believe in you, sweetie"', '#7cffa5', 220);
  moodUp(); sPow();
  return true;
}

function addPop(x,y,txt,c,life=60){
  popups.push({x,y,txt,c,t:life});
  if (popups.length > 6) popups.shift(); // playtest: cap the on-screen chatter
}
function addParts(x,y,c,n=8){
  for(let i=0;i<n;i++) parts.push({x,y,vx:(Math.random()-0.5)*3,vy:-Math.random()*3-1,t:30+Math.random()*20,c});
}

function update(){
  frame++;
  if (state === ST.TITLE) idleT++; else idleT = 0; // EGG: reverse-pitch idle clock (title only)
  if (state !== ST.PLAY) return;
  playMs += 1000 / 60; // simulated play clock — the only clock the HUD/badge trust
  const p = player;

  // HUMOR PATCH item 8: inside the hackathon house, the outside world waits
  if (room.active){ roomUpdate(); return; }
  // coffee chat / interview in progress: the world waits (investors do not)
  if (chat){ chatUpdate(); return; }
  if (interview){ interviewUpdate(); return; }
  // mini-game triggers: press C at a table / the door (touch: stand still ~2.5s)
  if (state === ST.PLAY){
    let atTable = -1;
    for (let i = 0; i < CHATS.length; i++)
      if (!CHATS[i].done && Math.abs(p.x - CHATS[i].x) < 22 && p.onGround) atTable = i;
    const atDoor = !accDone && Math.abs(p.x - ACC_X) < 16 && p.onGround;
    if (atTable >= 0 || atDoor){
      const still = Math.abs(p.vx) < 0.3;
      chatStill = still ? chatStill + 1 : 0;
      const go = keys['c'] || (('ontouchstart' in window) && chatStill >= 150);
      if (go){ if (atDoor) interviewStart(); else chatStart(atTable); }
    } else chatStill = 0;
  }

  // -------- robotaxi (neutral moving platform; stops dead mid-route, lovingly) --------
  taxi.dx = 0;
  if (taxi.stopT > 0){ taxi.stopT--; }
  else {
    taxi.dx = taxi.dir * ROBOTAXI.speed;
    taxi.x += taxi.dx;
    if (taxi.x <= ROBOTAXI.x0){ taxi.x = ROBOTAXI.x0; taxi.dir = 1; }
    if (taxi.x >= ROBOTAXI.x1 - ROBOTAXI.w){ taxi.x = ROBOTAXI.x1 - ROBOTAXI.w; taxi.dir = -1; }
    if (++taxi.moveT >= ROBOTAXI.stopEvery){
      taxi.moveT = 0; taxi.stopT = ROBOTAXI.stopFor;
      if (p.onTaxi) addPop(taxi.x, ROBOTAXI.top - 24, 'UNPLANNED STOP (safe)', '#8d99ae');
    }
  }

  // -------- player --------
  // cold brew boosts, enterprise process drags (×0.85, big logo heavy process)
  const speed = (p.coffeeT > 0 ? 2.5 : 1.7) * (p.slowT > 0 ? 0.85 : 1) * (bmSyncT > 0 ? 0.8 : 1) * (cof().id === 'tech' ? 1.08 : 1); // technical cofounder ships; board syncs drag
  if (L()) { p.vx = -speed; p.face = -1; }
  else if (R()) { p.vx = speed; p.face = 1; }
  else p.vx *= 0.7;

  // jump buffer, rising edge only (holding jump never auto-pogos)
  const jNow = JUMP();
  if (jNow && !prevJump){ p.jbuf = 6; p.pogo = false; } // a fresh press re-arms the stomp
  else if (p.jbuf > 0) p.jbuf--;
  prevJump = jNow;
  if (p.jbuf > 0 && p.onGround){ p.vy = p.matchaT > 0 ? JUMPV * 1.15 : JUMPV; p.onGround = false; p.jbuf = 0; sJump(); } // matcha: zen +15% jump
  // variable jump height (stomp reward-bounces exempt from the jump-cut)
  if (!jNow && p.vy < -2.5 && !(p.bounceT > 0)) p.vy = -2.5;

  p.vy += GRAV; if (p.vy > 8) p.vy = 8;
  p.x += p.vx;
  p.x = clamp(p.x, cam - 2, LEVEL_W - p.w);
  p.y += p.vy;
  // solid undersides (city crates/scaffolds): jumping into a block bonks your
  // head — you land ON platforms, you don't phase up through them. Deliberate
  // exceptions: cloud platforms stay soft (The Cloud is an abstraction), and
  // SDK crates + the robotaxi stay one-way (the trap-into-ladder boss fight
  // and the roof ride both depend on pass-through).
  if (p.vy < 0){
    for (const pl of plats){
      if (pl[0] > 7160) continue;                          // clouds: pass-through
      // corner forgiveness: grazing a block's edge by <7px never bonks — a pit
      // jump that clips a lip-adjacent crate must not get spiked into the pit
      const ov = Math.min(p.x + p.w, pl[0] + pl[2]) - Math.max(p.x, pl[0]);
      if (ov >= 7){
        const under = pl[1] + 12;                          // crate underside
        if (p.y - p.vy >= under && p.y < under){           // head crossed it going up
          p.y = under; p.vy = 0.6; p.jbuf = 0;             // bonk
          beep(150, .06, 'square', .05);
          break;
        }
      }
    }
  }
  p.onGround = false;

  // narrower centered foot sensor (no 1px-toe mid-air stands); prev-frame-above guard (no pit-wall snap-up)
  const g = groundBelow(p.x + 3, p.w - 6);
  if (g !== null && p.y + p.h >= g && p.vy >= 0 && p.y + p.h - p.vy <= g + 4){ p.y = g - p.h; p.vy = 0; p.onGround = true; }
  p.onTaxi = false;
  collidePlats(p);
  if (p.onTaxi) p.x += taxi.dx; // the roof carries you (the Bay's one trustworthy citizen)
  if (p.onGround) p.pogo = false; // touching ground also re-arms the stomp

  // boss walls
  for (const b of bosses){
    if (b.active && !b.dead && p.x + p.w > b.wall) p.x = b.wall - p.w;
  }

  // fell in a pit
  if (p.y > H + 30){
    deathCause = 'pit';
    moodDown();
    hearts--; sHurt();
    addPop(cam+220, 120, zoneName(p.x) === 'THE CLOUD' ? '-1 RUNWAY (the 0.01% downtime)' : '-1 RUNWAY (pivot failed)', '#ff5a5a');
    if (hearts <= 0){
      if (!momRound()){ endTime = playMs; recordDeathSpot(p.x); state = ST.DEAD; showEndUI(false); return; }
    }
    p.x = checkpoint; p.y = GROUND_Y - 40; p.vx = 0; p.vy = 0; p.hurtT = 90;
    cam = Math.max(0, checkpoint - 100);
  }

  if (p.coffeeT > 0) p.coffeeT--;
  if (p.ycT > 0) p.ycT--;
  if (p.hurtT > 0) p.hurtT--;
  if (p.bounceT > 0) p.bounceT--;
  if (p.matchaT > 0){ p.matchaT--; if (frame % 6 === 0) parts.push({x:p.x + Math.random()*10, y:p.y + 12, vx:0, vy:-0.4, t:16, c:'#39c46d'}); }
  if (p.slowT > 0) p.slowT--;
  if (p.deckT > 0) p.deckT--;
  if (deckCd > 0) deckCd--;

  // mood decay toward "heads down building"; sustained flawless caffeination goes deranged
  if (!moodLock){
    if (playMs - moodChangedAt > 2500 && moodTier !== 2){
      moodTier += moodTier < 2 ? 1 : -1;
      moodChangedAt = playMs;
    }
    if (moodTier === 3 && p.coffeeT > 0 && playMs - lastHitAt > 10000) moodTier = 4;
  }

  // HUMOR PATCH item 4 egg: hold perfectly still through a FULL rocket ascent
  // (200 of its 220 frames) — deliberately shorter than any burn tick, but you
  // WILL be sweating about it. That's the tradeoff. That's the joke.
  if (RISKY_CAMEOS && !witnessed && zoneName(p.x) === 'SAND HILL ROAD'
      && frame % 2700 < 220 && p.onGround && Math.abs(p.vx) < 0.3){
    if (++witnessStill >= 200){ witnessed = true; moodUp(); addPop(p.x, p.y - 20, 'WITNESSED HISTORY +$0K', '#ffd94a'); }
  } else witnessStill = 0;

  // burn rate: standing still burns runway (ROADMAP §3 — the theme lives in the loop;
  // AUDIT WEEK shortens the tick). Frame-counted: backgrounded tabs don't burn.
  // Riding the robotaxi is commuting, not idling — no burn on the roof.
  // And a following corgi pauses burn entirely (morale: high).
  if (Math.abs(p.vx) < 0.3 && p.onGround && !p.onTaxi && !(corgi.following && !corgi.sitting)) p.burnT = (p.burnT || 0) + 1; else p.burnT = 0;
  if (p.burnT > 60 * 3 && frame % 10 === 0)
    parts.push({x:p.x + 4 + Math.random()*4, y:p.y + 2, vx:0, vy:-0.6, t:20, c:'#8d99ae'}); // smoke warning
  if (p.burnT >= BURN_FRAMES){
    if (p.hurtT > 0 || p.ycT > 0){ p.burnT = BURN_FRAMES - 30; } // invulnerable: re-tick shortly, no fake popup (audit)
    else {
      p.burnT = 0;
      addPop(p.x, p.y - 14, 'BURN RATE', '#ff5a5a');
      hurtPlayer('burn'); if (state !== ST.PLAY) return;
    }
  }
  if (Math.abs(p.vx) > 0.5 && p.onGround && frame % 6 === 0) p.runFrame ^= 1;

  // checkpoints
  for (const c of checkpoints) if (p.x > c && checkpoint < c) checkpoint = c;

  // camera
  const target = clamp(p.x - 180, 0, LEVEL_W - W);
  cam += (target - cam) * 0.12;
  if (cam < 0) cam = 0;

  // -------- coins --------
  for (const c of coins){
    if (!c.got && aabb(p, c)){
      // NEPO intern on payroll: +20% per coin (his dad knows everyone)
      const cv2 = interns.some(i2 => i2.id === 'nepo') ? Math.round(COIN_VALUE * 1.2) : COIN_VALUE;
      c.got = true;
      if (cmoT > 0){ // in the vertical-video frame, money is impressions (B5)
        addPop(c.x, c.y - 6, '+0 REAL DOLLARS (impressions)', '#8d99ae');
      } else {
        raised += cv2; sCoin(); // rate environment sets the coin (ROADMAP §7)
        moodUp(); // every coin lifts the mood, even when the popup dedupes
        // one popup per coin cluster, not per coin — a full row was 5 stacked labels (playtest)
        if (!popups.some(q2 => q2.txt.startsWith('+$') && Math.abs(q2.x - c.x) < 56))
          addPop(c.x, c.y - 6, '+$' + cv2 + 'K', '#ffd94a');
      }
    }
  }

  // -------- powerups --------
  for (const pw of powers){
    if (!pw.got && aabb(p, pw)){
      pw.got = true; sPow();
      if (pw.t === 'rug') moodDown(); else moodUp(); // getting rugged is a mood

      // power pickups hold 2.5s (playtest: owner grabbed powers and couldn't
      // tell what they did — the 1s float was gone before it was read)
      if (pw.t === 'coffee'){ p.coffeeT = 60*10; addPop(pw.x, pw.y-8, 'COLD BREW! auto speed boost, 10s', '#c58bff', 150); }
      if (pw.t === 'yc'){ p.ycT = 60*8; addPop(pw.x, pw.y-8, 'ACCELERATED! invincible, 8s — just run', '#ff8c37', 150); }
      if (pw.t === 'matcha'){ p.matchaT = 60*10; addPop(pw.x, pw.y-8, 'MATCHA! auto +15% jump, 10s', '#39c46d', 150); }
      if (pw.t === 'press'){ p.shield = 1; addPop(pw.x, pw.y-8, 'GOOD PRESS! next hit is free (auto)', '#7ce0ff', 150); }
      if (pw.t === 'deck'){
        if (ped().id === 'teal'){ // paid $100K not to graduate; never learned to pitch code
          addPop(pw.x, pw.y-8, 'PITCH DECK — unusable (TEAL FELLOW: you never learned to code)', '#8d99ae', 180);
        } else {
          p.deckT = 60*15; // 15s: covers a full boss fight (playtest)
          addPop(pw.x, pw.y-8, ('ontouchstart' in window) ? 'PITCH DECK! tap — pitch AT them (15s)'
                                                          : 'PITCH DECK! press X — pitch AT them (15s)', '#ffd94a', 150);
        }
      }
      if (pw.t === 'angel'){ hearts = Math.max(maxHearts, 3); maxHearts = Math.max(maxHearts, hearts); addPop(pw.x, pw.y-8, 'ANGEL CHECK! RUNWAY REFILLED', '#7cffa5', 150); }
      if (pw.t === 'contract'){ raised += 100; p.slowT = 60*8; addPop(pw.x, pw.y-8, 'ENTERPRISE CONTRACT! +$100K (slows you, 8s)', '#7ce0ff', 150); addPop(pw.x, pw.y-18, '(procurement has questions)', '#8d99ae', 150); }
      if (pw.t === 'rug'){ raised = Math.max(0, raised - 5); addPop(pw.x, pw.y-8, 'RUGGED. -$5K', '#d64550'); }
      if (pw.t === 'sheet'){
        if (MK === 'downround'){
          addPop(pw.x, pw.y-8, 'TERM SHEET! +0 RUNWAY (the board will call)', '#7cffa5');
          bmSyncAt = Math.min(bmSyncAt, playMs + 4000); // and it does — a BOARD SYNC lands shortly (the copy stopped lying, audit)
        }
        else { if (hearts < 5) hearts++; maxHearts = Math.max(maxHearts, hearts); addPop(pw.x, pw.y-8, 'TERM SHEET! +1 RUNWAY', '#7cffa5'); }
      }
    }
  }

  // -------- enemies --------
  for (const e of enemies){
    if (e.dead) continue;
    if (e.t === 't'){
      // THOUGHT LEADER: sine hover, no gravity; patrols ±50 of home; drops THREAD bombs.
      // Achieved product-market fit as a person. Can't be stomped while posting.
      e.x += e.dir * 0.3;
      if (e.x > e.x0 + 50) e.dir = -1; else if (e.x < e.x0 - 50) e.dir = 1;
      e.y = e.baseY + Math.sin((frame + e.x0) * 0.03) * 10;
      if (Math.abs(e.x - p.x) < 220 && (frame + e.x0) % 140 === 0)
        shots.push({x:e.x + 1, y:e.y + e.h, vx:0, vy:0.4, w:14, h:9, t:'thread'});
      // falls through to player collision below
    } else if (e.t === 'c'){
      // COMPLIANCE PHANTOM: ignores terrain entirely. PATROLS its beat (the spec's
      // word) and only drifts at you inside 120px — a 320px chase radius made it
      // intercept players exactly on pit landings, where knockback chains into
      // the pit (bot-verified death cluster at the 4480 lip).
      if (e.home === undefined) e.home = e.x;
      if (Math.abs(e.x - p.x) < 120){
        e.x += (p.x > e.x ? 1 : -1) * 0.3;
        e.y += (p.y > e.y ? 1 : -1) * 0.2;
      } else {
        e.x += e.dir * 0.25;
        if (e.x > e.home + 60) e.dir = -1; else if (e.x < e.home - 60) e.dir = 1;
        e.y += (GROUND_Y - 40 - e.y) * 0.02;
      }
      e.y = clamp(e.y, 120, GROUND_Y - e.h);
    } else {
    const espd = e.t==='s' ? 1.1 : 0.45;
    // gravity for enemies
    e.vy = (e.vy||0) + GRAV; if (e.vy > 8) e.vy = 8;
    e.y += e.vy;
    const eg = groundBelow(e.x, e.w);
    if (eg !== null && e.y + e.h >= eg && e.vy >= 0){ e.y = eg - e.h; e.vy = 0;
      if (e.t==='m'){ e.hopT++; if (e.hopT > 70){ e.vy = -4.5; e.hopT = 0; } }
    }
    // turn at pit edges / patrol
    const nextX = e.x + e.dir * espd;
    if (groundBelow(nextX + (e.dir>0?e.w:0), 1) === null) e.dir *= -1;
    else e.x = nextX;
    if (e.t==='s' && Math.abs(p.x - e.x) < 140) e.dir = p.x < e.x ? -1 : 1;
    if (e.x < 0) { e.x = 0; e.dir = 1; }
    }

    // collide with player
    if (Math.abs(e.x - p.x) < 300 && aabb(p, e)){
      if (p.ycT > 0){ e.dead = true; sStomp(); raised += 10; moodUp(); addPop(e.x, e.y-8, 'DISRUPTED! +$10K', '#ff8c37'); addParts(e.x+7, e.y+7, '#ff8c37');
        if (enemies.every(x2 => x2.dead || x2.inj)) addPop(e.x, e.y-18, 'ZERO CHURN', '#ff8c37'); // EGG: 20/20 handled (injected phantoms don't gate it)
      }
      else if (p.vy > 1 && p.y + p.h - e.y < 10 && !(e.t === 't' && (frame + e.x0) % 140 < 36)){
        // (a thought leader mid-post has i-frames — the glow warns you)
        e.dead = true; p.vy = -5; p.bounceT = 12; sStomp(); moodUp();
        const reward = e.noBounty ? 0 : (e.t === 't' || e.t === 'c') ? 15 : 10;
        raised += reward;
        const msgs = {g:'CHURN CRUSHED! +$10K', m:'MEETING CANCELED! +$10K', s:'THESIS DECLINED! +$10K',
                      t:"RATIO'D! +$15K", c:'EXEMPTED! +$15K'};
        addPop(e.x, e.y-8, msgs[e.t], '#7cffa5'); addParts(e.x+7, e.y+7, '#7cffa5');
        if (enemies.every(x2 => x2.dead || x2.inj)) addPop(e.x, e.y-18, 'ZERO CHURN', '#ff8c37'); // EGG: 20/20 handled (injected phantoms don't gate it)
      }
      else { hurtPlayer({g:'gremlin', m:'meeting', s:'scooter', t:'thought leader', c:'phantom'}[e.t]); if (state !== ST.PLAY) return; }
    }
  }

  // -------- bosses --------
  for (const b of bosses){
    if (b.dead) continue;
    if (!b.active && p.x > b.trigger){
      b.active = true; sBoss(); b.quipT = 1;
      if (b.id === 'platform') track('first_boss');
      if (b.id === 'vc' && !b.pedApplied){ // Chad funds the pedigree, not the company
        b.pedApplied = true;
        if (ped().mult >= 20){
          if (b.quips[0] !== "oh, you were at SYNERGY.AI? here's the check")
            b.quips.unshift("oh, you were at SYNERGY.AI? here's the check");
          b.hp = Math.max(1, b.hp - 1);   // the check clears before the fight starts
          addPop(b.x - 30, b.y - 20, 'CHAD RESPECTS THE RÉSUMÉ (-1 HP)', '#7cffa5', 150);
        } else if (ped().id === 'none'){
          if (b.quips[0] !== 'and who are you?')
            b.quips.unshift('and who are you?'); // being normal is the real hard mode
        }
      }
    }
    if (!b.active) continue;

    // movement: pace toward player (THE PLATFORM is slow and huge — and never hops).
    // SYNERGY.AI 0.8→0.6 (levers table, re-measured per ruling 2.4's own protocol:
    // 30 humans x 20 attempts = 0 wins — at 0.8 its homing walk made side-contact
    // damage unavoidable for anyone who isn't frame-precise)
    const bspd = b.id==='ai' ? 0.6 : b.id==='platform' ? 0.35 : 0.6;
    b.dir = p.x < b.x ? -1 : 1;
    b.x += b.dir * bspd;
    b.x = clamp(b.x, b.trigger + 30, b.wall - b.w - 4);
    b.vy = (b.vy||0) + GRAV;
    b.y += b.vy;
    if (b.y + b.h >= GROUND_Y){ b.y = GROUND_Y - b.h; b.vy = 0;
      if (frame % 160 === 0 && b.id !== 'platform') b.vy = b.id==='ai' ? -5.5 : -4.5;
    }

    // quips
    b.quipT--;
    if (b.quipT <= 0){ b.quip = (b.quip+1) % b.quips.length; b.quipT = MK === 'pragma' ? 70 : 140; } // quip 2x faster, hit same

    // boss i-frames tick
    if (b.hitT > 0) b.hitT--;

    // HUMOR PATCH item 7: SLOP PHASE — at <=2 HP SYNERGY.AI starts generating
    if (b.id === 'ai' && b.hp <= 2){
      if (!b.slopped){ b.slopped = true; addPop(b.x - 40, b.y - 48, 'GENERATING CONTENT', '#8fd18f'); sBoss(); }
      if (frame % 90 === 0 && slops.length < 4){
        slopN++;
        let slopX = clamp(b.x + (slopN % 2 ? -70 - (slopN % 3) * 30 : 70 + (slopN % 3) * 30), b.trigger + 20, b.wall - 36);
        if (Math.abs(slopX - p.x) < 40) slopX = clamp(slopX + (slopX > p.x ? 40 : -40), b.trigger + 20, b.wall - 36); // never ON the player (audit)
        slops.push({ x: slopX,
                     y: GROUND_Y - 22, w: 16, h: 22, real: slopN % 5 === 4, lbl: SLOP_LABELS[slopN % 3], wob: 0 });
      }
    }

    // attacks
    b.atkT--;
    if (b.atkT <= 0){
      if (b.id === 'vc'){
        // lob a term sheet arc
        shots.push({x:b.x+b.w/2, y:b.y+6, vx:(p.x<b.x?-1:1)*(1.4+Math.random()), vy:-4.2, w:12, h:10, t:'sheet', label:'TERMS'});
        b.atkT = 95;
      } else if (b.id === 'platform'){
        // drop an SDK crate at the player — its attacks literally build lock-in
        // around you (and the crates are the ladder to its head)
        crates.push({ x: clamp(p.x - 2, b.trigger + 24, b.wall - 24), y: 40, vy: 0, landed: false, t: 480 });
        b.atkT = 140;
      } else {
        // v0.2 pool (MASTER-PLAN §1.4) — pill is drawn to measured text, AABB stays 26x9
        const words = ['PIVOT','SYNERGY','GTM','AGENTIC','B2B','SLOP','AI-NATIVE','ROADMAP','ALIGNMENT','WEB-SCALE'];
        const sx = b.x+(b.dir<0?-4:b.w-6);
        // staggered spawn band, skip if a live buzz is crowding the muzzle (de-collision, ruling 2.5)
        if (!shots.some(s2 => s2.t==='buzz' && Math.abs(s2.x - sx) < 30))
          shots.push({x:sx, y:b.y-6+Math.random()*28, vx:b.dir*2.2, vy:0, w:26, h:9, t:'buzz',
                      label: words[Math.floor(Math.random()*words.length)], wob:Math.random()*6.28});
        b.atkT = 85; // was 70 — attack-rate lever, same human re-measure as bspd above
      }
    }

    // player vs boss
    if (aabb(p, b)){
      if (p.vy > 1 && p.y + p.h - b.y < 12){
        // stomp: always bounce + separate above the boss (never re-enter the AABB next frame)
        p.vy = -5.5; p.bounceT = 12; p.y = b.y - p.h - 1; sStomp();
        // damage needs i-frames expired AND an armed stomp (fresh jump press or ground touch
        // since the last bounce) — a zero-input drop bounces forever but only ever hits once
        if (!(b.hitT > 0) && !p.pogo){
          b.hp--; b.hitT = 30; moodUp();
          addParts(b.x+b.w/2, b.y, '#fff', 12);
          addPop(b.x-40, b.y-12, b.hp>0 ? 'CONVICTION: '+b.hp : 'DOWN ROUND!!', '#ffd94a');
          if (b.hp <= 0){
            b.dead = true;
            shots.length = 0; // no posthumous term sheets
            const bonus = b.id==='ai' ? 500 : b.id==='platform' ? 350 : 250;
            const line = b.id==='ai' ? 'SYNERGY.AI ACQUIRED (BY YOU)' : b.id==='platform' ? 'DEPRECATED!' : 'VC HUMBLED';
            raised += bonus; sWin();
            addPop(b.x-40, b.y-20, line+' +$'+bonus+'K', '#7cffa5');
            addParts(b.x+b.w/2, b.y+b.h/2, '#ffd94a', 24);
          }
        }
        else if (p.pogo && !(b.hitT > 0) && !b.hinted){
          // the invisible wall between casuals and a win: a bounce without a fresh
          // jump press does no damage, and nothing ever said so. Say so. Once.
          b.hinted = true;
          addPop(b.x - 44, b.y - 48, 'TIP: PRESS JUMP AGAIN TO STOMP', '#7ce0ff', 150);
        }
        p.pogo = true; // disarm until the next jump press / ground touch
      } else { hurtPlayer(b.id === 'vc' ? 'VC terms' : b.id === 'platform' ? 'platform boss' : 'buzzword', 'SYNERGY'); if (state !== ST.PLAY) return; }
    }
  }

  // -------- shots --------
  for (const s of shots){
    if (s.t === 'sheet'){ s.vy += 0.18; }
    if (s.t === 'buzz'){ s.wob += 0.15; s.y += Math.sin(s.wob) * 0.8; }
    if (s.t === 'thread'){ s.vy += 0.12; if (s.y + s.h >= GROUND_Y) s.gone = true; } // THREAD hits the floor, ends
    s.x += s.vx; s.y += s.vy;
    if (s.mine){
      // the flying PITCH DECK — flattens enemies, argues with bosses on their own terms
      for (const e of enemies){
        if (!e.dead && aabb(s, e)){
          s.gone = true; e.dead = true; sStomp(); raised += 10; moodUp();
          addPop(e.x, e.y-8, 'DECKED! +$10K', '#7cffa5'); addParts(e.x+7, e.y+7, '#7cffa5');
          if (enemies.every(x2 => x2.dead)) addPop(e.x, e.y-18, 'ZERO CHURN', '#ff8c37');
        }
      }
      for (const b of bosses){
        if (b.active && !b.dead && aabb(s, b)){
          s.gone = true;
          if (!(b.hitT > 0)){
            b.hp--; b.hitT = 30;
            addParts(b.x+b.w/2, b.y, '#fff', 12);
            addPop(b.x-40, b.y-12, b.hp>0 ? 'CONVICTION: '+b.hp : 'DOWN ROUND!!', '#ffd94a');
            if (b.hp <= 0){
              b.dead = true; shots.length = 0;
              const bonus = b.id==='ai' ? 500 : b.id==='platform' ? 350 : 250;
              const line = b.id==='ai' ? 'SYNERGY.AI ACQUIRED (BY YOU)' : b.id==='platform' ? 'DEPRECATED!' : 'VC HUMBLED';
              raised += bonus; sWin();
              addPop(b.x-40, b.y-20, line+' +$'+bonus+'K', '#7cffa5');
              addParts(b.x+b.w/2, b.y+b.h/2, '#ffd94a', 24);
            }
          }
        }
      }
    } else if (aabb(p, s)){
      s.gone = true;
      hurtPlayer(s.t === 'sheet' ? 'VC terms' : s.t === 'thread' ? 'thought leader' : 'buzzword', s.label);
      if (state !== ST.PLAY) return;
    }
    if (s.y > H + 20 || s.x < cam - 40 || s.x > cam + W + 40) s.gone = true;
  }
  shots = shots.filter(s => !s.gone);

  // -------- HUMOR PATCH item 10 egg: café loyalty (idle 10s at the corgi café) --------
  if (!cafeRegular){
    if (Math.abs(p.x - 2596) < 44 && p.onGround && Math.abs(p.vx) < 0.3){
      if (++cafeStill >= 600){
        cafeRegular = true;                            // +nothing, forever
        addPop(p.x - 20, p.y - 20, 'you are now a regular', '#d9748f');
      }
    } else cafeStill = 0;
  }

  // -------- HUMOR PATCH item 9: the vibes CMO catches you in frame --------
  if (cmoT > 0) cmoT--;
  if (!cmoDone && Math.abs(p.x - 2320) < 30){ // moved off the café block (owner: Mission too cramped); spec wanted her near the matcha anyway
    cmoDone = true; cmoT = 90;
  }

  // -------- HUMOR PATCH item 8: the hackathon house door --------
  if (!room.done && !room.active && Math.abs(p.x + 6 - ROOM_DOOR_X) < 9 && p.onGround){
    room.active = true; room.t = 720; room.px = 24;
    room.cans = [{x:90},{x:150},{x:215},{x:280},{x:345}].map(c => ({...c, got:false}));
    sPow();
  }

  // -------- HUMOR PATCH item 7: slop clones — shamble, die on touch, one is real --------
  for (const sl of slops){
    sl.wob += 0.2;
    sl.x += (p.x > sl.x ? 1 : -1) * 0.3 + Math.sin(sl.wob) * (sl.real ? 0 : 0.4); // slop can't even walk straight
    if (aabb(p, sl)){
      sl.gone = true;
      if (sl.real){ hurtPlayer('buzzword', 'SLOP'); if (state !== ST.PLAY) return; }
      else { addPop(sl.x, sl.y - 10, 'SLOP', '#8d99ae'); addParts(sl.x + 8, sl.y + 10, '#8fd18f', 6); }
    }
  }
  slops = slops.filter(sl => !sl.gone);
  if (bosses[2].dead && slops.length){ slops = []; } // the model is unplugged; the content stops

  // -------- HUMOR PATCH item 6: the corgi --------
  if (!corgi.following && corgi.followT === 0 && Math.abs(p.x - corgi.x) < 26){
    corgi.following = true; corgi.followT = 1800; corgi.sitting = false; corgiHired = true;
    addPop(corgi.x - 10, GROUND_Y - 28, 'CORGI ACQUIRED (acqui-hire)', '#ffd94a');
    moodUp(); sPow();
  }
  if (corgi.following){
    if (corgi.sitting){
      if (corgi.sitT > 0) corgi.sitT--;                          // the sit is a whole moment; let it read
      else if (Math.abs(p.x - corgi.x) < 26) corgi.sitting = false; // you came back. of course you did.
    } else {
      const cdx = (p.x - 14 * p.face) - corgi.x;
      corgi.x += clamp(cdx * 0.08, -2.2, 2.2);
      if (Math.abs(cdx) > 2) corgi.face = cdx > 0 ? 1 : -1;
      if (--corgi.followT <= 0){ corgi.following = false; }      // shift's over; heads back to the café
    }
  } else if (Math.abs(corgi.x - CORGI_HOME) > 2){
    corgi.x += corgi.x > CORGI_HOME ? -0.8 : 0.8;                // trots home
    corgi.face = corgi.x > CORGI_HOME ? -1 : 1;
  }

  // -------- NEPO FOUNDER baggage: the board member calls (v1.3 owner pass:
  // the trailing body made the game cramped — same governance, zero bodies).
  // Every ~30s: a BOARD SYNC drags you to 0.8x speed for 1.5s. ----
  if (ped().id === 'nepo' && state === ST.PLAY){
    if (playMs > bmSyncAt){
      bmSyncAt = playMs + 20000; bmSyncT = 90; // x50 deserves real governance (audit: baggage was too light)
      addPop(p.x, p.y - 24, 'BOARD SYNC — "quick one, promise"', '#8d99ae', 150);
    }
  }
  if (bmSyncT > 0) bmSyncT--;

  // -------- cofounder follower (reuses the corgi's lerp — no new physics) --------
  if (cof().id !== 'none'){
    if (cofX === 0) cofX = p.x - 16;                        // first frame: fall in behind
    const cdx2 = (p.x - 16 * p.face) - cofX;
    cofX += clamp(cdx2 * 0.08, -2.6, 2.6);
    if (Math.abs(cdx2) > 2) cofFace = cdx2 > 0 ? 1 : -1;
    if (--cofBubT <= 0){ cofBubT = 560; cofSaid++; }        // a line every ~9s, shown for ~2s (rotation on the sim clock)
    // the AI cofounder "helps" exactly once per run
    if (cof().id === 'ai' && playMs > aiNudgeAt && aiNudgeT === 0){
      aiNudgeT = 30; aiNudgeAt = Infinity;
      addPop(p.x, p.y - 24, 'your AI cofounder is "helping"', '#c58bff', 150);
    }
    if (aiNudgeT > 0){ aiNudgeT--; p.vx += p.face > 0 ? -0.3 : 0.3; } // gentle wrong-way tug
    if (cof().id === 'ai' && cmoT === 0){ // it does not sleep: hoovers coins in a small radius
      for (const c of coins)
        if (!c.got && Math.abs(c.x - p.x) < 34 && Math.abs(c.y - (p.y + 8)) < 40){
          c.got = true; raised += COIN_VALUE; sCoin();
          if (!popups.some(q2 => q2.txt.includes('(AI)') && Math.abs(q2.x - c.x) < 56))
            addPop(c.x, c.y - 6, '+$' + COIN_VALUE + 'K (AI)', '#c58bff');
        }
    }
  }

  // -------- interns: hire (dwell), trail, and each type's catch --------
  {
    let atBooth = null;
    for (const bo of BOOTHS)
      if (!bo.hired && Math.abs(p.x - bo.x) < 14 && p.onGround) atBooth = bo;
    if (atBooth && interns.length < 2){
      const T = INTERN_TYPES[atBooth.type];
      if (++internDwell >= 30){
        internDwell = 0;
        if (raised < T.cost){ addPop(p.x, p.y - 22, "can't afford the intern. (yes.)", '#8d99ae', 150); }
        else {
          atBooth.hired = true; raised -= T.cost;
          internHiredCount++; internTypesHired.push(T.id);
          addPop(p.x, p.y - 24, 'HIRED: ' + T.name + (T.cost ? ' (-$' + T.cost + 'K)' : ' ($0)'), '#7cffa5', 180);
          interns.push({ id: T.id, x: p.x - 24, t: { grinder: 1200, ghost: 180, nepo: 1800, unpaid: 900 }[T.id] || -1,
                         face: 1, invis: T.id === 'ghost' });
          sPow();
        }
      }
    } else internDwell = 0;
    for (const it of interns){
      // v1.3 owner pass: interns work REMOTE — no trailing bodies (the follower
      // parade made the game feel cramped). Effects anchor on the player; the
      // TEAM line in the HUD is their whole physical presence.
      if ((it.id === 'grinder' || it.id === 'unpaid') && !it.invis){
        for (const c of coins){
          if (!c.got && Math.abs(c.x - p.x) < 60 && Math.abs(c.y - (GROUND_Y - 20)) < 60){
            c.got = true;
            if (cmoT > 0){ addPop(c.x, c.y - 6, '+0 REAL DOLLARS (impressions)', '#8d99ae'); } // vanity binds the whole team
            else if (it.id === 'grinder'){
              const icv = interns.some(i3 => i3.id === 'nepo') ? Math.round(COIN_VALUE * 1.2) : COIN_VALUE;
              raised += icv; sCoin(); addPop(c.x, c.y - 6, '+$' + icv + 'K (intern)', '#7cffa5');
            }
            else addPop(c.x, c.y - 6, '+$0 (for exposure)', '#8d99ae');
          }
        }
      }
      if (it.t > 0 && --it.t === 0){
        if (it.id === 'ghost') addPop(p.x, p.y - 22, 'your intern ghosted — accepted 6 other offers', '#8d99ae', 200);
        if (it.id === 'grinder') addPop(p.x, p.y - 22, 'got a better offer. it was also unpaid.', '#8d99ae', 200);
        if (it.id === 'nepo') addPop(p.x, p.y - 22, 'left in a town car. said nothing.', '#8d99ae', 200);
        if (it.id === 'unpaid'){
          addPop(p.x, p.y - 22, 'the LABOR BOARD has questions', '#d64550', 200);
          const lb = makeEnemy({ x: clamp(p.x + 200, 100, 9100), t: 'c' });      // a compliance phantom, with a cause
          lb.inj = true; lb.noBounty = true;
          enemies.push(lb);
        }
        it.gone = true;
      }
    }
    interns = interns.filter(it => !it.gone);
  }

  // -------- billboards: a partner board greets you once per run --------
  for (const bb of BILLBOARDS){
    if (bb.partner && !bb.spotted && Math.abs(p.x - bb.x) < 40){
      bb.spotted = true; raised += 5; sPow();
      addPop(p.x, p.y - 24, 'SPOTTED: ' + bb.name + ' (a real startup, unlike yours) +$5K', '#7cffa5', 150);
    }
  }

  // -------- 30 UNDER 30: the list is watching (a phantom, every ~45s) --------
  if (playMs > listHeatAt && state === ST.PLAY){
    listHeatAt += 45000;
    const lw = makeEnemy({ x: clamp(p.x + 240, 100, 9100), t: 'c' });
    lw.inj = true; lw.noBounty = true;   // the list gives nothing back (audit P0: farmable)
    enemies.push(lw);
    addPop(p.x, p.y - 24, 'the list is watching', '#c58bff', 150);
  }

  // barry's memory fades on the sim clock (was ticked in draw — audit)
  if (barrySawIt && ++barryShownT > 240){ barrySawIt = false; barryShownT = 0; }

  // -------- run-club wave (cosmetic; spawns on the playMs clock) --------
  if (!wave && playMs % 45000 < 17 && playMs > 1000) wave = { x: 3040 };
  if (wave){ wave.x += 2.4; if (wave.x > 3980) wave = null; }

  // -------- SDK crates (Platform boss) — fall, land, platform for 8s, deprecate --------
  for (const c of crates){
    if (!c.landed){
      c.vy += GRAV; if (c.vy > 8) c.vy = 8;
      c.y += c.vy;
      if (c.y + 12 >= GROUND_Y){ c.y = GROUND_Y - 12; c.landed = true; }
    } else if (--c.t <= 0){
      c.gone = true;
      addPop(c.x - 8, c.y - 10, 'DEPRECATION NOTICE', '#8d99ae');
    }
  }
  crates = crates.filter(c => !c.gone);

  // -------- particles / popups --------
  for (const q of parts){ q.x += q.vx; q.y += q.vy; q.vy += 0.15; q.t--; }
  parts = parts.filter(q => q.t > 0);
  for (const q of popups){ q.y -= 0.4; q.t--; }
  popups = popups.filter(q => q.t > 0);

  // -------- IPO bell (win) --------
  // Owner cut the rope-snap joke (v2 of humor item 3): reach the bell and the
  // ceremony arms immediately — no fake-out, straight to earning the swing.
  const finalBoss = bosses[2];
  if (state === ST.PLAY && finalBoss.dead && !bellDone && !bellRing && p.x > 9100){
    bellRing = { meter: 0, done: false, celeT: 0 };
    addPop(9040, GROUND_Y - 70, ('ontouchstart' in window) ? 'MASH A — RING THE BELL' : 'MASH R — RING THE BELL', '#ffd94a', 200);
  }
  // the ringing ceremony — every press yanks the rope; the meter decays, the
  // bell only gives when you mean it. Then: chime + confetti + the badge.
  if (bellRing && !bellRing.done && state === ST.PLAY){
    bellRing.meter = Math.max(0, bellRing.meter - 0.005);
    const down = keys['r'] || keys['space'] || touch.J;
    if (down && !ringHeld && p.x > 9060){
      bellRing.meter = Math.min(1, bellRing.meter + 0.16);
      shakeT = 2;
      beep(700 + bellRing.meter * 700, .07, 'triangle', .12);   // rope creak, rising
      addParts(9125 + Math.random() * 12, GROUND_Y - 34, '#ffd94a', 3);
    }
    ringHeld = down;
    if (bellRing.meter >= 1){
      bellRing.done = true; bellRing.celeT = 110;
      bellDone = true;                 // the win COMMITS here (audit P0: dying mid-confetti
      player.hurtT = 200;              // kept the +$1M and re-armed the bell) — celebration
      endTime = playMs; raised += 1000; moodUp(); //  is invulnerable theater from this frame
      // the chime: three overlapping bell partials, long tails
      beep(1568, .9, 'triangle', .16); beep(1046, 1.3, 'triangle', .12); beep(784, 1.8, 'sine', .09);
      addPop(9070, GROUND_Y - 84, 'THE BELL RINGS. IPO!', '#ffd94a', 110);
    }
  } else if (bellRing && bellRing.done && state === ST.PLAY){
    // confetti over the podium, then the badge
    if (--bellRing.celeT > 0){
      if (bellRing.celeT % 4 === 0){
        const cols = ['#ffd94a', '#7cffa5', '#7ce0ff', '#d9748f', '#fff'];
        addParts(9030 + Math.random() * 170, 90 + Math.random() * 70, cols[bellRing.celeT % 5], 6);
      }
    } else {
      state = ST.WIN; sWin();
      showEndUI(true);
    }
  }
}
// ------------------------- SPRITES -------------------------
// ---------------- FOUNDER LOOK (customization) ----------------
// 6 skin tones, light→deep. Hair color is paired to tone (keeps the picker to
// three keys and every hair-on-skin / hair-on-background pair pre-validated —
// contrast tables in /qa/design-customization.md §2, checker: qa/contrast-check.js).
const SKINS = [
  { skin:'#ffdfc2', hair:'#6b4a2e', hairDk:'#503620' },
  { skin:'#f2c9a0', hair:'#4a3626', hairDk:'#35261a' },  // 1 = canon default
  { skin:'#dba470', hair:'#3a2a1e', hairDk:'#2a1d14' },
  { skin:'#b5825a', hair:'#2e2016', hairDk:'#20160e' },
  { skin:'#9a6a45', hair:'#241812', hairDk:'#170f0a' },
  { skin:'#84573a', hair:'#1d130c', hairDk:'#120b06' },
];
const HAIRS = ['HOOD UP','BUZZ','CURLY','PONYTAIL'];   // style names shown in the picker
const HOODIES = [
  { name:'FOG',      main:'#7f8ea3', pocket:'#5f6e83' },  // 0 = canon default
  { name:'MATCHA',   main:'#5da06b', pocket:'#41794e' },
  { name:'GRAPE',    main:'#a281e6', pocket:'#7e5fc0' },
  { name:'SUNSET',   main:'#d9748f', pocket:'#a9556c' },
  { name:'OAT MILK', main:'#d8c9a8', pocket:'#b0a17f' },
  { name:'UPTIME',   main:'#3aa8a0', pocket:'#2a7f79' },
];

// picker state (indices) — NOT reset by reset(); survives runs and reloads
let look = { s:1, h:0, v:0 };
try {
  const j = JSON.parse(localStorage.getItem('fm_look'));
  if (j) look = {
    s: clamp(j.s|0, 0, SKINS.length-1),
    h: clamp(j.h|0, 0, HAIRS.length-1),
    v: clamp(j.v|0, 0, HOODIES.length-1),
  };
} catch(e){ /* private mode / blocked storage — canon default */ }

// resolved colors consumed by every draw site (incl. makeBadge & sprites.js)
function resolveLook(){
  const S = SKINS[look.s];
  // Konami egg: the gray zip-up. Founder mode is a state of mind and one garment.
  const V = (typeof konamiDone !== 'undefined' && konamiDone)
    ? { main:'#6e7787', pocket:'#5a6272' } : HOODIES[look.v];
  return { skin:S.skin, hair:S.hair, hairDk:S.hairDk,
           hood:V.main, pocket:V.pocket, hairStyle:look.h };
}
window.FOUNDER_LOOK = resolveLook();

function cycleLook(k){                       // k: 's' | 'h' | 'v' | 'x' (cofounder)
  if (k === 'x'){
    cofIdx = (cofIdx + 1) % COFOUNDERS.length;
    try { localStorage.setItem('fm_cof', cofIdx); } catch(e){}
    beep(880, .05, 'square', .05);
    return;
  }
  if (k === 'p'){
    pedIdx = (pedIdx + 1) % PEDIGREES.length;
    try { localStorage.setItem('fm_ped', pedIdx); } catch(e){}
    beep(920, .05, 'square', .05);
    return;
  }
  const n = k==='h' ? HAIRS.length : 6;
  look[k] = (look[k] + 1) % n;
  window.FOUNDER_LOOK = resolveLook();
  try { localStorage.setItem('fm_look', JSON.stringify(look)); } catch(e){}
  beep(880, .05, 'square', .05);             // picker tick
}

// PEDIGREE gear (v1.3 owner pass): the résumé is VISIBLE on the founder —
// drawn over drawFounder wherever the player appears (world, badge, newsprint).
function drawPedGear(ctx2, x, y, s){
  if (pedIdx === 0) return;
  const R = (px2, py2, w, h, c) => { ctx2.fillStyle = c;
    ctx2.fillRect(Math.round(x + px2*s), Math.round(y + py2*s), w*s, h*s); };
  const id = ped().id;
  if (id === 'serial'){                       // two dead startups: the eye bags + the old briefcase
    R(4, 5, 1, 1, '#6a7183'); R(8, 5, 1, 1, '#6a7183');
    R(-4, 9, 4, 4, '#5a4632'); R(-3, 8, 2, 1, '#3d2e1f');
  } else if (id === 'drop'){                  // STANFURD: the cardinal cap
    R(2, -1, 8, 2, '#b31b1b'); R(4, -2, 4, 1, '#b31b1b');
  } else if (id === 'thirty'){                // the laurel (the list is cursed)
    R(1, 1, 2, 1, '#ffd94a'); R(9, 1, 2, 1, '#ffd94a'); R(5, -1, 2, 1, '#ffd94a');
  } else if (id === 'teal'){                  // the teal beanie ($100K not to graduate)
    R(2, -1, 8, 2, '#0f8b8d'); R(2, 1, 8, 1, '#0a6466');
  } else if (id === 'nepo'){                  // the little crown (warm intro from birth)
    R(3, -3, 6, 2, '#ffd94a'); R(3, -5, 1, 2, '#ffd94a'); R(6, -6, 1, 3, '#ffd94a'); R(8, -5, 1, 2, '#ffd94a');
  } else if (id === 'exsyn'){                 // the ex-employee lanyard, never returned
    R(5, 6, 1, 4, '#41f2ff'); R(4, 10, 4, 3, '#e8ecf5'); R(4, 10, 4, 1, '#41f2ff');
  }
}

// hoodie founder sprite (12x16 at s=1)// hoodie founder sprite (12x16 at s=1)
// lk (optional): resolved look object; defaults to the player's chosen look.
function drawFounder(ctx2, x, y, s, face, runF, yc, lk){
  const L = lk || window.FOUNDER_LOOK ||
    { skin:'#f2c9a0', hair:'#4a3626', hairDk:'#35261a',
      hood:'#7f8ea3', pocket:'#5f6e83', hairStyle:0 };     // canon fallback
  const hood = yc ? '#ff8c37' : L.hood;                     // accel flash overrides hoodie
  const R = (px2, py2, w, h, c) => { ctx2.fillStyle = c;
    ctx2.fillRect(Math.round(x + px2*s), Math.round(y + py2*s), w*s, h*s); };

  // hoodie body + pocket + drawstring
  R(1,6,10,6, hood);
  R(4,9,4,3, L.pocket);
  R(5,6,1,3, '#fff');
  // jeans (run animation alternates legs) + sneakers — not customizable (canon)
  if (runF){ R(2,12,3,3,'#3b5bdb'); R(7,12,3,4,'#3b5bdb'); }
  else     { R(2,12,3,4,'#3b5bdb'); R(7,12,3,3,'#3b5bdb'); }
  R(2,15,3,1,'#e8e8e8'); R(7,15,3,1,'#e8e8e8');
  // face + eye
  R(3,2,6,4, L.skin);
  if (face >= 0) R(7,3,1,2,'#222'); else R(4,3,1,2,'#222');

  // hair / hood — drawn LAST so it frames the face and lies over the shoulder
  const st = L.hairStyle;
  if (st === 0){                                   // HOOD UP (pixel-identical to v0.1)
    R(2,0,8,2, hood); R(2,2,1,1, hood); R(9,2,1,1, hood);
  } else {
    R(3,5,6,1, hood);                              // collar: hood worn down
    if (st === 1){                                 // BUZZ
      R(3,1,6,1, L.hair); R(3,2,1,1, L.hair); R(8,2,1,1, L.hair);
    } else if (st === 2){                          // CURLY
      R(2,0,8,2, L.hair); R(1,0,1,3, L.hair); R(10,0,1,3, L.hair);
      R(2,2,1,1, L.hair); R(9,2,1,1, L.hair);
      R(3,0,1,1, L.hairDk); R(6,0,1,1, L.hairDk); R(4,1,1,1, L.hairDk); R(9,1,1,1, L.hairDk);
    } else {                                       // PONYTAIL
      R(2,0,8,2, L.hair); R(2,2,1,2, L.hair); R(9,2,1,2, L.hair);
      const tx = face >= 0 ? 0 : 10;
      R(tx,1,2,7, L.hair); R(tx,4,2,1, L.hairDk);
      if (runF) R(tx,8,2,1, L.hair);
    }
  }
}

// -------- coffee chat: full-frame scene + world-side tables --------
function drawChat(){
  const c = CHATS[chat.ci];
  occlude(0, 0, W, H);                                     // clean slate on the text layer
  // urgency shake — the meeting is ending and the room knows it (draw-only)
  const urgent = chat.phase === 'q' && chat.t < 120;
  uiShakeX = urgent ? ((frame * 13) % 3) - 1 : 0;
  uiShakeY = urgent ? ((frame * 7) % 3) - 1 : 0;
  px(-2, -2, W + 4, H + 4, '#171221');                     // café interior (oversized so the shake never shows seams)
  px(0, 210, W, 60, '#2a2338');                            // floor
  px(150, 176, 180, 10, '#6b4f2a'); px(160, 186, 8, 24, '#54401f'); px(312, 186, 8, 24, '#54401f'); // table
  px(196, 166, 10, 10, '#e8ecf5'); px(206, 168, 3, 5, '#e8ecf5');   // your cup
  px(272, 166, 10, 10, '#e8ecf5'); px(269, 168, 3, 5, '#e8ecf5');   // their cup
  if (frame % 40 < 20){ px(199, 158, 2, 5, '#8d99ae'); px(275, 158, 2, 5, '#8d99ae'); } // steam
  drawFounder(cx, 120 + uiShakeX, 128 + uiShakeY, 3, 1, 0, false);        // you
  drawFounder(cx, 322 + uiShakeX, 128 + uiShakeY, 3, -1, 0, false, c.lk); // them
  cx.textAlign = 'left';
  // header — starts right of the RAISED box (drawHUD owns the top-left corner)
  cx.font = 'bold 9px monospace'; cx.fillStyle = '#ffd94a';
  cx.fillText('COFFEE CHAT — ' + c.name, 134, 18);
  cx.font = 'bold 7px monospace'; cx.fillStyle = '#8d99ae';
  cx.fillText(chat.qi === 0 && chat.phase === 'q' && chat.t > 540 ? c.intro : 'question ' + Math.min(chat.qi + 1, 3) + ' of 3 — press ← or → to answer', 134, 30);
  if (chat.phase === 'q'){
    const q = c.qs[chat.qi];
    // TIME bar — drains left to right, blinks when the silence is getting long
    const barW = Math.max(0, Math.round((W - 60) * Math.min(chat.t, 540) / 540));
    cx.font = 'bold 7px monospace'; cx.fillStyle = urgent && (frame >> 3) % 2 ? '#d64550' : '#8d99ae';
    cx.fillText('TIME', 16, 42);
    px(44, 36, W - 60, 6, '#232a3a');
    px(44, 36, barW, 6, chat.t < 180 ? (urgent && (frame >> 3) % 2 ? '#ff8c37' : '#d64550') : '#39c46d');
    // the whole exchange lives at the top: question, then the two answers under it
    cx.font = 'bold 9px monospace'; cx.fillStyle = '#fff';
    cx.fillText('"' + q.q + '"', 16, 58);
    const optA = chat.swap ? q.b : q.a, optB = chat.swap ? q.a : q.b;
    px(12, 64, 222, 32, '#232a3a'); px(12, 64, 222, 2, '#7ce0ff');
    px(246, 64, 222, 32, '#232a3a'); px(246, 64, 222, 2, '#ffd94a');
    cx.font = 'bold 8px monospace';
    cx.fillStyle = '#7ce0ff'; cx.fillText('←', 18, 76);
    cx.fillStyle = '#ffd94a'; cx.fillText('→', 452, 76);
    cx.font = 'bold 7px monospace'; cx.fillStyle = '#e8ecf5';
    cx.fillText(optA, 18, 88); cx.fillText(optB, 252, 88);
    cx.fillStyle = '#8d99ae';
    cx.fillText('← picks the left answer, → the right. freezing is also an answer.', 16, 110);
  } else {
    cx.font = 'bold 8px monospace';
    cx.fillStyle = chat.phase === 'end' ? (chat.amt ? '#7cffa5' : '#ff8c8c') : (chat.good ? '#7cffa5' : '#ff8c8c');
    cx.fillText('"' + chat.msg + '"', 16, 58);
    if (chat.phase === 'end'){
      cx.fillStyle = '#ffd94a'; cx.font = 'bold 9px monospace';
      cx.fillText(chat.amt ? '+$' + chat.amt + 'K RAISED' : '+$0. exposure, probably.', 16, 76);
    }
  }
  uiShakeX = uiShakeY = 0;                                 // the HUD does not panic
  drawHUD();
}

    cx.fillStyle = '#d97706'; cx.fillText('→', 452, 76);
    cx.font = 'bold 7px monospace'; cx.fillStyle = '#1a1a2e';
    cx.fillText(optA, 18, 88); cx.fillText(optB, 252, 88);

      cx.fillText(interview.flashBad ? '✗' : '✓', 452, 58);

      cx.font = 'bold 8px monospace'; cx.fillStyle = '#1d9e50';
      cx.fillText('...respect.', 390, 110);

  } else {
    cx.font = 'bold 9px monospace';

    cx.fillText(interview.won ? '"we\'d like you to be in the batch."' : '"we suggest applying again. everyone should apply. always."', 16, 60);

      cx.fillStyle = '#1a1a2e'; cx.fillText('stamped: ACCELERATOR · BATCH F26', 16, 106); }
  }
  uiShakeX = uiShakeY = 0;                                  // the HUD does not panic
  drawHUD();
}

// shared bubble for the humor-patch NPCs (coach/celebs) — 8px, cameo style
// Bubbles placed this frame stack upward instead of overlapping (playtest:
// two talkers in range rendered on top of each other — both unreadable). A
// white stem stretches from the raised box back down to the speaker.
let bubbleRects = []; // cleared at the top of every draw()
let lateDraws = [];   // deferred draw thunks: bubbles/signs that must render OVER the player
function celebBubble(sxCenter, topY, line){
  cx.font = 'bold 8px monospace';
  const tw = cx.measureText(line).width;
  const bx = clamp(sxCenter - tw/2 - 4, 2, W - tw - 10);
  let by = topY - 30;
  let guard = 0;
  while (guard++ < 8 && bubbleRects.some(r =>
    bx < r.x + r.w + 4 && bx + tw + 8 > r.x - 4 && by < r.y + r.h + 2 && by + 12 > r.y - 2)) by -= 15;
  bubbleRects.push({ x: bx, y: by, w: tw + 8, h: 12 });
  px(bx, by, tw + 8, 12, '#fff'); occlude(bx, by, tw + 8, 12);
  px(clamp(sxCenter + 2, bx + 2, bx + tw + 2), by + 12, 4, (topY - 15) - (by + 12), '#fff');
  cx.fillStyle = '#111'; cx.fillText(line, Math.round(bx + 4), Math.round(by + 9.5));
}

function drawCameoBubble(c){
  const x = c.x - cam; if (x < -40 || x > W + 40) return;
  if (Math.abs(player.x - (c.x + 7)) > 60) return;
  if (c.id === 'stealth' && frame % 90 > 85) return;               // can't talk while nonexistent
  celebBubble(x + 7, GROUND_Y - c.h + 2, c.line);                  // same geometry, now stack-aware
}

const PICADO = ['#ff5d8f','#3dd6c3','#ffd94a','#b07fe8']; // Mission bunting flag cycle

function drawBG(){
  const B = BIOMES[zoneName(cam + W/2)];                       // zone by camera center
  const grd = cx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, B.sky[0]); grd.addColorStop(0.55, B.sky[1]); grd.addColorStop(0.8, B.sky[2]);
  grd.addColorStop(1, B.sky[3]);
  cx.fillStyle = grd; cx.fillRect(0, 0, W, H);
  // stars (SOMA) / warm specks (Mission) / gold motes (Sand Hill) / data specks (Cloud)
  cx.fillStyle = B.star;
  for (let i = 0; i < 24; i++){
    const sx = (i * 137 + 40) % W, sy = (i * 61) % 90;
    cx.fillRect(sx, sy, 1, 1); // steady — the sky doesn't flicker (owner call)
  }
  if (!B.voidZone){ // THE CLOUD: the city is gone
  // far skyline (parallax .25)
  const o1 = -(cam * 0.25) % 300;
  cx.fillStyle = B.far;
  for (let bx = o1 - 300; bx < W + 300; bx += 300){
    cx.fillRect(bx + 10, 130, 34, 110);
    // salesforce tower (rounded top-ish)
    cx.fillRect(bx + 60, 92, 26, 150); cx.fillRect(bx + 64, 84, 18, 10);
    cx.fillRect(bx + 100, 145, 40, 100);
    // transamerica pyramid
    for (let t = 0; t < 12; t++) cx.fillRect(bx + 160 + t, 100 + t * 4, 24 - t * 2, 4);
    cx.fillRect(bx + 210, 135, 30, 110);
    // sutro tower
    cx.fillRect(bx + 262, 78, 3, 60); cx.fillRect(bx + 274, 78, 3, 60); cx.fillRect(bx + 260, 96, 19, 3);
  }
  // near skyline (parallax .5) with lit windows
  const o2 = -(cam * 0.5) % 260;
  for (let bx = o2 - 260; bx < W + 260; bx += 260){
    cx.fillStyle = B.near;
    cx.fillRect(bx, 160, 50, 80); cx.fillRect(bx + 70, 140, 44, 100); cx.fillRect(bx + 130, 172, 60, 70); cx.fillRect(bx + 205, 150, 40, 90);
    cx.fillStyle = B.win;
    for (let wy = 0; wy < 5; wy++) for (let wx = 0; wx < 3; wx++)
      // seed windows from the building's WORLD tile, not the parallax float —
      // the old bx seed re-rolled every frame while scrolling (flickering city)
      if (((Math.round((bx + cam * 0.5) / 260) * 7 + wx * 13 + wy * 29) % 5 + 5) % 5 < 2)
        cx.fillRect(bx + 74 + wx * 12, 146 + wy * 16, 4, 5);
  }
  }
  // HUMOR PATCH item 4: the ROCKET GUY's launches — every ~45 sim-seconds behind
  // the Sand Hill skyline; every 10th one comes back down and LANDS (reusable).
  // He is never on screen. Only the rocket. (RISKY_CAMEOS)
  if (RISKY_CAMEOS){
    const rt = frame % 2700, launchN = Math.floor(frame / 2700);
    const sx = ROCKET_ANCHOR - cam * 0.5;
    if (sx > -20 && sx < W + 20){
      cx.fillStyle = '#3a3a4c'; cx.fillRect(Math.round(sx - 3), 138, 10, 3);   // the pad, always there
      const landing = launchN % 10 === 9;
      const drawRocket = (ry, flame) => {
        cx.fillStyle = '#e8ecf5'; cx.fillRect(Math.round(sx), Math.round(ry), 4, 9);
        cx.fillStyle = '#c0402a'; cx.fillRect(Math.round(sx + 1), Math.round(ry - 3), 2, 3);
        cx.fillStyle = flame; cx.fillRect(Math.round(sx + 1), Math.round(ry + 9), 2, 4);
      };
      if (rt < 220){                                            // ascent
        drawRocket(134 - (rt / 220) * 170, frame % 4 < 2 ? '#ff8c37' : '#ffd94a');
        if (frame % 3 === 0){ cx.fillStyle = 'rgba(220,220,230,.5)'; cx.fillRect(Math.round(sx - 1 + (frame % 5)), Math.round(147 - (rt / 220) * 170), 2, 2); }
      } else if (landing && rt < 440){                          // the 1-in-10 comeback
        drawRocket(-36 + ((rt - 220) / 220) * 170, frame % 4 < 2 ? '#7ce0ff' : '#fff');
      } else if (landing && rt < 700){                          // stuck the landing
        cx.fillStyle = '#e8ecf5'; cx.fillRect(Math.round(sx), 128, 4, 9);
        cx.fillStyle = '#c0402a'; cx.fillRect(Math.round(sx + 1), 125, 2, 3);
      }
    }
  }
  if (B.bunting){ // THE MISSION: papel picado strung between the near buildings, parallax .5
    const o3 = -(cam * 0.5) % 64;
    for (let bx = o3 - 64; bx < W + 64; bx += 64){
      cx.fillStyle = 'rgba(20,12,24,.8)'; cx.fillRect(bx, 88, 64, 1);                    // wire
      for (let f = 0; f < 4; f++){ cx.fillStyle = PICADO[f];
        cx.fillRect(bx + 6 + f*15, 89, 7, 5); cx.fillRect(bx + 8 + f*15, 94, 3, 2); }    // flag + cut-paper tail
    }
  }
  // Karl the Fog (recolored per zone)
  const fx = (frame * 0.2) % (W + 200) - 100;
  cx.fillStyle = B.fog[0];
  cx.fillRect(0, 110, W, 26);
  cx.fillStyle = B.fog[1];
  cx.fillRect(fx - 60, 104, 200, 20); cx.fillRect(fx + 180, 116, 160, 16);
  if (B.foggy){ cx.fillStyle = B.fog[0]; cx.fillRect(0, 60, W, 20); cx.fillRect(0, 140, W, 34); } // Cerebral Valley only

  // billboards — mid-ground .5, in FRONT of the fog (the y110 haze band washed
  // out panel tops when boards drew earlier), behind the .85 bridge + gameplay.
  // Drawn in every biome including THE CLOUD's void: the city is gone, the ads
  // remain. v2 (owner pass): panels 132x30 (were 180x40), steel frame, corner
  // rivets, catwalk + braced posts — smaller and more built.
  for (const bb of BILLBOARDS){
    if (state === ST.TITLE) break;                             // the title owns its sky — no boards over the logo
    const x = Math.round((bb.x - cam) * 0.5) - 66;             // anchored parallax .5, panel centered on bb.x
    if (x < -142 || x > W + 10) continue;
    px(x + 16, bb.y + 32, 4, 28, '#3a3a44'); px(x + 112, bb.y + 32, 4, 28, '#3a3a44'); // posts
    px(x + 20, bb.y + 44, 6, 2, '#2c2c36'); px(x + 26, bb.y + 40, 6, 2, '#2c2c36');    // brace L
    px(x + 106, bb.y + 44, 6, 2, '#2c2c36'); px(x + 100, bb.y + 40, 6, 2, '#2c2c36');  // brace R
    px(x - 3, bb.y + 32, 138, 2, '#4a4a56');                   // maintenance catwalk (under the frame lip)
    px(x - 2, bb.y - 2, 136, 34, '#23232e');                   // steel frame
    px(x, bb.y, 132, 30, bb.bg); px(x, bb.y, 132, 2, bb.fg);   // panel + accent
    px(x + 1, bb.y + 1, 1, 1, '#6a6a78'); px(x + 130, bb.y + 1, 1, 1, '#6a6a78');      // rivets
    px(x + 1, bb.y + 27, 1, 1, '#6a6a78'); px(x + 130, bb.y + 27, 1, 1, '#6a6a78');
    occlude(x - 2, bb.y - 2, 136, 34);                         // panel owns its overlay space
    cx.fillStyle = bb.fg; cx.font = 'bold 11px monospace';
    cx.fillText(bb.name, x + 7, bb.y + 13);
    cx.fillStyle = '#cbd5e1'; cx.font = 'bold 6px monospace';
    cx.fillText(bb.tagline, x + 7, bb.y + 24);
    if (bb.partner){ px(x + 108, bb.y + 3, 22, 8, '#111'); cx.fillStyle = bb.fg; cx.font = 'bold 6px monospace'; cx.fillText('REAL', x + 111, bb.y + 9); }
  }
  // golden gate towers near the finale (world-anchored)
  // anchor 7700 = the war-room's 6000 fix + the +1700 world shift. (The level file's
  // CODE_UPDATES said 8600 — that predates the war-room finding and would need
  // cam>9435 with cam now clamped at 8720: unreachable dead code again. 7700 keeps
  // the bridge sweeping across the finale, red against the void.)
  const ggx = 7700 - cam * 0.85;
  if (ggx > -320 && ggx < W + 320){
    // v2 (owner: "the bridge needs to be CLEAR"): full structure in bright
    // international orange — deck, twin towers with three crossbeams, sagging
    // main cables with suspenders. Still background; still no hitboxes.
    const ORANGE = '#f04e23', DARK = '#b03318';
    const deckY = 196, topY = 58;
    // road deck
    cx.fillStyle = DARK;  cx.fillRect(ggx - 170, deckY + 4, 500, 3);
    cx.fillStyle = ORANGE; cx.fillRect(ggx - 170, deckY, 500, 4);
    // towers (above and below deck) with crossbeams
    for (const tx of [ggx, ggx + 150]){
      cx.fillStyle = ORANGE;
      cx.fillRect(tx, topY, 5, 178); cx.fillRect(tx + 9, topY, 5, 178);
      for (const by of [topY + 14, topY + 52, topY + 96]) cx.fillRect(tx - 2, by, 18, 5);
      cx.fillStyle = DARK; cx.fillRect(tx + 5, topY, 4, 178);   // inner shade
    }
    // main cables: approach — sag — approach, then suspenders down to the deck
    const cy = (x0, y0, cxm, cym, x1, y1) => { // one quadratic run + its suspenders
      cx.strokeStyle = ORANGE; cx.lineWidth = 2;
      cx.beginPath(); cx.moveTo(x0, y0); cx.quadraticCurveTo(cxm, cym, x1, y1); cx.stroke();
      cx.lineWidth = 1; cx.strokeStyle = DARK;
      for (let t = 0.15; t < 0.95; t += 0.16){
        const qx = (1-t)*(1-t)*x0 + 2*(1-t)*t*cxm + t*t*x1;
        const qy = (1-t)*(1-t)*y0 + 2*(1-t)*t*cym + t*t*y1;
        if (qy < deckY - 2){ cx.beginPath(); cx.moveTo(qx, qy); cx.lineTo(qx, deckY); cx.stroke(); }
      }
    };
    cy(ggx - 170, deckY, ggx - 80, deckY - 30, ggx + 7, topY);            // left approach
    cy(ggx + 7, topY, ggx + 82, deckY - 26, ggx + 157, topY);             // the sag
    cy(ggx + 157, topY, ggx + 250, deckY - 30, ggx + 330, deckY);         // right approach
  }
}

// ------------------------- DRAW -------------------------
function draw(){
  tcx.clearRect(0, 0, tv.width, tv.height); // text overlay redraws with every frame
  bubbleRects.length = 0;                   // speech-bubble stacking resets per frame
  lateDraws.length = 0;                     // post-player deferred draws reset per frame
  // hurt juice: 2-frame camera shake
  if (shakeT > 0 && state === ST.PLAY){ cx.translate(frame % 2 ? 2 : -2, 0); shakeT--; }

  drawBG();

  if (state === ST.TITLE){ cx.setTransform(1, 0, 0, 1, 0, 0); drawTitle(); return; }

  // HUMOR PATCH item 8: inside the hackathon house — full-frame interior
  if (state === ST.PLAY && room.active){
    occlude(0, 0, W, H);                                          // billboards etc. stay outside
    px(0, 0, W, H, '#181322');                                    // 2am interior
    px(0, 232, W, H - 232, '#2a2338');                            // floor
    px(0, 0, W, 18, '#1f6feb');                                   // sponsor banner
    cx.font = 'bold 9px monospace'; cx.fillStyle = '#fff'; cx.textAlign = 'center';
    cx.fillText('SPONSORED BY OMNICORP CLOUD', W/2, 12);
    cx.textAlign = 'left';
    cx.font = 'bold 8px monospace'; cx.fillStyle = '#8d99ae';
    cx.fillText('HOUR 46 OF 48', 20, 40);
    const secs = Math.ceil(room.t / 60);
    cx.fillStyle = secs <= 4 && frame % 20 < 10 ? '#ff5a5a' : '#ffd94a';
    cx.font = 'bold 12px monospace';
    cx.fillText('DEMO IN ' + secs + 's', 350, 40);

  for (const fn of lateDraws) fn(); // boss quips + held signs render EVERY frame (they strobed with the hurt flash — audit)

    cx.fillStyle = 'rgba(8,8,16,.82)';
    cx.fillRect(0, 0, 150, H); cx.fillRect(330, 0, 150, H);       // vertical crop
    occlude(0, 0, 150, H); occlude(330, 0, 150, H);               // HUD text stays out of frame
    cx.strokeStyle = '#fff'; cx.lineWidth = 2;
    cx.strokeRect(150.5, 4.5, 179, H - 9);
    cx.font = 'bold 8px monospace'; cx.fillStyle = '#fff'; cx.textAlign = 'center';
    cx.fillText('✨ day in my life as an obstacle ✨', 240, 22);
    // the counter ticks LIVE while you're content (B5) — engagement is a verb now
    const vBase = 2100000 + (90 - cmoT) * 4137, lBase = 402000 + (90 - cmoT) * 619;
    cx.fillText((vBase / 1000000).toFixed(2) + 'M views · ♥ ' + Math.round(lBase / 1000) + 'K', 240, H - 16);
    if (frame % 20 < 10){ cx.fillStyle = '#ff5a5a'; cx.fillRect(156, 10, 5, 5); }
    // a LIKE floats off you. you are the content.
    const hy = (90 - cmoT) * 0.6;

    if (cmoT > 45) cx.fillText('♥', Math.round(player.x - cam - 6), Math.round(player.y - 2 - hy * 1.4));

  if ((endTime || playMs) < 180000) f.push('T2D3');

}

  const g = b.createLinearGradient(0, 0, 0, 630);
  g.addColorStop(0, '#141433'); g.addColorStop(1, '#2a1a3e');

  if (playerName()){ b.fillStyle = '#7ce0ff'; b.font = 'bold 30px monospace'; b.fillText('FOUNDER: ' + playerName().toUpperCase(), 320, 245); }
  const t = fmtTime(endTime || playMs);
  b.font = 'bold 44px monospace'; b.fillStyle = '#7cffa5';
  b.fillText('RAISED  ' + fmtMoney(raised), 320, 295);
  b.fillStyle = '#7ce0ff';
  b.fillText('TIME    ' + t, 320, 347);
  b.fillStyle = '#c58bff';
  if (won){
    const bossesDown = bosses.filter(x => x.dead).length;
    b.fillText('BOSSES  ' + bossesDown + '/3 defeated', 320, 399);
  } else {
    b.fillText('DIED IN  ' + zoneName(player.x), 320, 399); // loss badges differ by death point
  }

  b.fillStyle = '#cfd6e4';
  // v0.2 rotating one-liner pools (MASTER-PLAN §1.6) — quote rotates per run;
  // the loss badge's zone line (DIED IN {zone}, above) stays regardless
  const WIN_QUOTES = [
    '"we\'re basically profitable" — you, probably',
    '"this was the plan all along" — you, revising history',
    '"I never doubted us" — you, who doubted us',
    '"staying humble" — your LinkedIn post about it',
  ];
  const LOSS_QUOTES = [
    '"it was a market timing issue" — you, on LinkedIn',
    '"we learned so much" — you, learning nothing',
    '"the market wasn\'t ready" — the market, ready',
    '"pivoting to consulting" — 40% of your batch',
  ];
  // ---- lower band: flair / batch / pedigree / mom / quote stack dynamically
  // (fixed-y lines collided the moment a run earned more than two of them —
  //  owner screenshot, v1.3 review) ----
  const rows = [];
  const flairs = badgeFlairs(won);
  if (flairs.length) rows.push({ t: 'FLAIR: ' + flairs.join('  ·  '), c: '#ff8c37', s: 28 });
  if (won && accBatch) rows.push({ t: 'ACCELERATOR · BATCH F26', c: '#d97706', s: 24 });
  if (pedIdx > 0) rows.push({ t: 'PEDIGREE: ' + ped().label + ' (×' + ped().mult + ') — "' + ped().badge + '"', c: '#ff8c37', s: 24 });
  else if (won) rows.push({ t: '"' + ped().badge + '"', c: '#8d99ae', s: 24 });
  if (won && momBacked) rows.push({ t: 'SEED LED BY: MOM (undisclosed)', c: '#d9748f', s: 24 });
  const pool = won ? WIN_QUOTES : LOSS_QUOTES;
  rows.push({ t: pool[Math.floor(quoteRoll * pool.length) % pool.length], c: '#cfd6e4', s: 28 });
  let ry = 442;
  const step = Math.min(42, Math.floor((578 - 442) / rows.length)); // band always ends above the footer
  for (const r of rows){
    let fs = Math.min(r.s, step - 6);
    b.font = 'bold ' + fs + 'px monospace';
    while (fs > 18 && b.measureText(r.t).width > 1080){ fs -= 2; b.font = 'bold ' + fs + 'px monospace'; }
    b.fillStyle = r.c;
    b.fillText(r.t, 60, ry, 1080);
    ry += step;
  }
  b.fillStyle = '#ffd94a'; b.font = 'bold 30px monospace';
  b.fillText('FOUNDER MODE · ' + GAME_URL.replace('https://',''), 320, 586);
  return bc;
}
