function obitHeadline(won){
  if (won){
    const h = WIN_FRONTPAGE.h;
    return playerName() ? h.replace(/^LOCAL FOUNDER/, playerName().toUpperCase()) : h;
  }
  const cause = OBIT_HEADLINES[deathCause] ? deathCause : 'burn';
  let h = cause === 'buzzword' ? `MAN KILLED BY THE WORD "${deathWord}"` : OBIT_HEADLINES[cause].h;
  if (playerName()){
    const N = playerName().toUpperCase();
    h = h.replace(/^LOCAL FOUNDER/, N).replace(/^FOUNDER(?=[ '])/, N).replace(/^MAN(?= )/, N);
  }
  return h;
}

function makeObituary(won){
  const cause = OBIT_HEADLINES[deathCause] ? deathCause : 'burn';
  const headline = obitHeadline(won);
  const sub = (won && pedIdx === 0) ? 'Nobody can explain how.'   // the self-made egg
            : won ? WIN_FRONTPAGE.s : OBIT_HEADLINES[cause].s;
  const INK = '#16130c', FAINT = '#4a4438', GREEK = '#c9c0aa', PAPER = '#ece5d3';
  const oc = document.createElement('canvas');
  oc.width = 1200; oc.height = 630;
  const b = oc.getContext('2d');
  b.imageSmoothingEnabled = false;
  b.fillStyle = PAPER; b.fillRect(0, 0, 1200, 630);
  b.textAlign = 'left';

  const wrap = (text, maxW) => { // word-wrap against the current font
    const words = text.split(' '), lines = [];
    let line = '';
    for (const w of words){
      const tryLine = line ? line + ' ' + w : w;
      if (b.measureText(tryLine).width > maxW && line){ lines.push(line); line = w; }
      else line = tryLine;
    }
    if (line) lines.push(line);
    return lines;
  };

  // masthead
  b.fillStyle = INK; b.fillRect(40, 16, 1120, 3);
  b.font = 'bold 56px monospace'; b.textAlign = 'center';
  b.fillText('HYPERGROWTH DAILY', 600, 70);
  b.fillRect(40, 84, 1120, 1);
  const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  b.font = 'bold 16px monospace'; b.textAlign = 'left'; b.fillStyle = FAINT;
  b.fillText(`${DAYS[_today.getDay()]}, ${MONTHS[_today.getMonth()]} ${_today.getDate()}, ${_today.getFullYear()} · "all signal, no revenue" · $8/mo`, 48, 106);
  b.textAlign = 'right';
  b.fillText('MARKETS: ' + MARKET.s.slice(0, 42), 1152, 106, 520);
  b.textAlign = 'left';
  b.fillStyle = INK; b.fillRect(40, 116, 1120, 4);

  // headline (shrink to fit) + subhead
  let hs = 46;
  b.font = `bold ${hs}px monospace`;
  while (hs > 26 && b.measureText(headline).width > 1112){ hs -= 2; b.font = `bold ${hs}px monospace`; }
  b.fillStyle = INK; b.fillText(headline, 44, 168);
  b.font = 'bold 21px monospace'; b.fillStyle = FAINT;
  b.fillText(sub, 46, 200, 1108);
  b.fillStyle = INK; b.fillRect(40, 214, 1120, 1);

  // two columns: 3 real lines each (seeded by the run), then greeked bars
  const POOL = won ? WIN_BODY : OBIT_BODY;
  const i1 = Math.floor(quoteRoll * POOL.length) % POOL.length;
  const i2 = (i1 + 1 + Math.floor(quoteRoll * 3)) % POOL.length === i1
           ? (i1 + 1) % POOL.length : (i1 + 1 + Math.floor(quoteRoll * 3)) % POOL.length;
  const rM = fmtMoney(raised), tM = fmtTime(endTime || playMs);
  b.font = 'bold 17px monospace';
  // column bodies are sliced to 3 wrapped lines (356px @17px ≈ 35 chars/line):
  // every override below must land its punchline inside ~105 characters
  const MOM_LOSS = "The sole investor — the founder's mom — said: 'I'm still proud of you.'";
  const PED_WIN  = `The round, sources say, was less the product, more that the founder was ${ped().label}.`;
  const PED_LOSS = `Despite being ${ped().label}, it died. 'We assumed the pedigree would carry it.'`;
  [[48, i1], [440, i2]].forEach(([cx2, bi]) => {
    b.fillStyle = INK;
    const bodyText = (momBacked && !won && cx2 === 440) ? MOM_LOSS
                 : (pedIdx > 0 && cx2 === 440) ? (won ? PED_WIN : PED_LOSS)
                 : POOL[bi](rM, tM);
    wrap(bodyText, 356).slice(0, 3).forEach((ln, li) => b.fillText(ln, cx2, 246 + li * 25));
    b.fillStyle = GREEK;
    for (let g = 0; g < 6; g++) b.fillRect(cx2, 332 + g * 22, g % 3 === 2 ? 250 : 352, 12);
  });

  // the "photo": founder at 10x, tilted, framed, with caption
  b.strokeStyle = INK; b.lineWidth = 3;
  b.strokeRect(846, 232, 306, 262);
  b.save();
  b.beginPath(); b.rect(848, 234, 302, 258); b.clip();
  b.translate(999, 355); b.rotate(-0.055);
  drawFounder(b, -60, -85, 10, 1, 0, false);
  drawPedGear(b, -60, -85, 10);
  b.restore();
  b.font = 'bold 14px monospace'; b.fillStyle = FAINT; b.textAlign = 'center';
  b.fillText(playerName()
    ? playerName() + (won ? ', pictured at peak validation' : ', pictured at peak conviction')
    : OBIT_CAPTIONS[Math.floor(quoteRoll * 3) % 3], 999, 514, 300);
  if (accBatch){ b.fillStyle = '#8a6d00'; b.font = 'bold 15px monospace'; b.textAlign = 'center';
    b.fillText(won ? 'BATCH F26 (it will tell you)' : 'was, it should be noted, BATCH F26', 999, 534, 300); }
  b.textAlign = 'left';

  // pull quote
  b.fillStyle = INK; b.fillRect(48, 486, 8, 74);
  b.font = 'bold 30px monospace';
  b.fillText(won ? (momBacked ? '"he\'s always been very driven"' : '"i never doubted us"')
                 : '"it was a market timing issue"', 72, 520, 720);
  b.font = 'bold 16px monospace'; b.fillStyle = FAINT;
  b.fillText(won ? (momBacked ? '— the founder\'s mother, who led the round (terms undisclosed)' : '— you, who doubted us, on LinkedIn')
                 : '— you, on LinkedIn', 72, 550);

  // bottom ticker
  b.fillStyle = INK; b.fillRect(0, 592, 1200, 38);
  b.fillStyle = PAPER; b.font = 'bold 19px monospace';
  const pedTick = pedIdx > 0 ? ` · PEDIGREE: ${ped().label} ×${ped().mult}` : '';
  b.fillText((won ? `RAISED ${rM} ▲ · BELL RUNG ▲ · VIBES: ALL-TIME HIGH` 
                  : `RAISED ${rM} ▼ · RUNWAY 0.0 MONTHS ▼ · VIBES DELISTED`) + pedTick + ' · NEXT: YOUR RUN?', 48, 617, 1104);
  return oc;
}

// -------- VALUATION — the leaderboard number (canon: money IS the score).
// RAISED is cash in; the market awards multiples for a growth story (speed),
// capital discipline (runway left), and vibes (a dog). Losing is a down round.
// Every multiple is shown in full on the end card — the math being legible is
// the joke landing.
function valuation(won){
  const t = endTime || playMs;
  let v = Math.max(raised, 1);
  const lines = ['RAISED ' + fmtMoney(raised)];
  if (won){
    const spd = t < 180000 ? 2 : t < 240000 ? 1.6 : t < 300000 ? 1.3 : 1;
    if (spd > 1){ v *= spd; lines.push('× ' + spd.toFixed(1) + '  GROWTH STORY (' + fmtTime(t) + ')'); }
    if (hearts > 0){ v *= 1 + hearts * 0.15; lines.push('× ' + (1 + hearts * 0.15).toFixed(2) + ' CAPITAL DISCIPLINE (' + hearts + ' runway left)'); }
  } else {
    v *= 0.5; lines.push('× 0.5  DOWN ROUND (you died)');
  }
  if (corgiHired){ v *= 1.1; lines.push('× 1.1  CHIEF MORALE OFFICER (corgi)'); }
  if (ped().mult > 1){ v *= ped().mult; lines.push('× ' + ped().mult + '  PEDIGREE: ' + ped().label); }
  v = Math.round(v);
  return { v, lines, final: 'VALUATION ' + fmtMoney(v) };
}

// per-run result link: /api/r renders og tags for THIS run then bounces to the
// game — LinkedIn/Twitter unfurl the actual scorecard (ROADMAP §8, audit item)
function resultUrl(won){
  if (!/^https?:$/.test(location.protocol)) return GAME_URL;
  const q = `w=${won ? 1 : 0}&n=${encodeURIComponent(playerName())}&v=${valuation(won).v | 0}&r=${raised | 0}` +
            `&t=${encodeURIComponent(fmtTime(endTime || playMs))}&p=${pedIdx}`;
  return GAME_URL + '/api/r?' + q;
}
function shareText(won){
  const t = fmtTime(endTime || playMs);
  const f = badgeFlairs(won);
  const val = valuation(won);
  return won
    ? `I just beat FOUNDER MODE 🦄\n\nRaised ${fmtMoney(raised)}, stomped the churn gremlins, out-jumped a VC whose vest is load-bearing, and defeated SYNERGY.AI in ${t}. Exit valuation: ${fmtMoney(val.v)}.` +
      (f.length ? `\n\nFlair earned: ${f.join(' · ')}.` : '') +
      `\n\nCan you top my valuation?\n\nPlay: ${resultUrl(true)}`
    : `FOUNDER MODE just took me out. Raised ${fmtMoney(raised)} and died in ${zoneName(player.x)} 💀 Final valuation: ${fmtMoney(val.v)} (down round).\n\nIt was a market timing issue.\n\nThink you can survive SF?\n\nPlay: ${resultUrl(false)}`;
}

function showEndUI(won){
  track(won ? 'win' : 'badge_screen');
  // input hygiene: a held R must not wipe the badge; the d-pad must not sit on top of the buttons
  keys['r'] = false; touch.L = touch.R = touch.J = false;
  document.getElementById('touch').style.display = 'none';

  const isTouch = 'ontouchstart' in window;
  // two share surfaces on a loss: the obituary front page (default) and the
  // classic badge behind a toggle. One surface on a win: the badge.
  const surfaces = {
    badge: { c: makeBadge(won), fname: won ? 'founder-mode-unicorn.png' : 'founder-mode-rip.png',
             text: shareText(won), save: '⬇ SAVE BADGE + COPY POST', blob: null, file: null, blobUrl: null, url: '' },
  };
  surfaces.obit = { c: makeObituary(won), fname: won ? 'hypergrowth-daily-ipo.png' : 'hypergrowth-daily-frontpage.png',
    text: `I made the front page of Hypergrowth Daily: '${obitHeadline(won)}'. Play: ${resultUrl(won)}`,
    save: '⬇ SAVE PAGE + COPY POST', blob: null, file: null, blobUrl: null, url: '' };
  let cur = won ? 'badge' : 'obit'; // wins lead with the badge, losses with the front page
  for (const k in surfaces){
    const s = surfaces[k];
    s.url = s.c.toDataURL('image/png');
    // pre-generate blobs so they're ready inside click handlers (required on iOS)
    s.c.toBlob(blob => { if (blob){ s.blob = blob; s.file = new File([blob], s.fname, {type:'image/png'}); s.blobUrl = URL.createObjectURL(blob); } }, 'image/png');
  }
  // feature-detect native file share (no UA sniffing) with a sync dummy file
  let canShareFiles = false;
  try { canShareFiles = !!(navigator.canShare && navigator.canShare({files:[new File([new Uint8Array(4)], 'b.png', {type:'image/png'})]})); } catch(err){}

  const bShare = canShareFiles ? '<button id="bSh" class="alt">📤 SHARE</button>' : '';
  const bSave  = `<button id="bDl">${surfaces[cur].save}</button>`;
  const bRetry = `<button id="bRe">↻ ${won ? 'RUN IT BACK' : 'PIVOT (RETRY)'}</button>`;
  const bTog   = `<button id="bTg" style="font-size:12px; padding:6px 10px">${won ? 'view front page' : 'view classic badge'}</button>`;
  // losers are the comedy's best distributors: PIVOT first, share buttons
  // immediately second (FINAL-REVIEW §2 amendment — outranks the spec's order)
  const btns = won ? bShare + bSave + bRetry + bTog : bRetry + bShare + bSave + bTog;

  const val = valuation(won);
  lastVal = val.v;
  try { const b = lbBest(); if (!b || lastVal > b.val)
    localStorage.setItem('fm_best', JSON.stringify({ val: lastVal, won, t: endTime || playMs })); } catch(e){}
  const valHtml = `
    <div><div style="display:inline-block; text-align:left; font-weight:bold; font-size:15px; color:#cfd6e4; margin-top:8px; line-height:1.6; background:rgba(0,0,0,.4); padding:8px 16px">
      ${val.lines.join('<br>')}<br>
      ${cof().id !== 'none' ? 'COFOUNDER: ' + (cof().id === 'mom' ? 'YOUR MOM' : cof().label) + '<br>' : ''}<span style="color:#ffd94a; font-size:19px">= ${val.final}</span>
    </div></div>`;
  // name row always renders (the name stamps the badge + front page);
  // the POST button needs the network, so it's http(s)-only
  const lbHtml = `
    <div style="margin-top:6px">
      <input id="lbName" maxlength="14" placeholder="YOUR NAME" value="${(() => { try { return localStorage.getItem('fm_name') || ''; } catch(e){ return ''; } })()}"
        style="width:170px; text-transform:uppercase; font:bold 16px 'Courier New',monospace; padding:8px 6px; text-align:center; border:3px solid #1a1a2e">
      ${LB_ON ? '<button id="lbGo" class="alt">🏆 POST VALUATION</button>' : ''}
    </div>
    <div id="lbList" style="color:#cfd6e4; font-weight:bold; font-size:15px; margin-top:6px; line-height:1.6"></div>`;
  uicard.innerHTML = `
    <img id="endImg" src="${surfaces[cur].url}" style="width:min(720px,86vw,calc((100vh - 250px)*1.9)); border:4px solid ${won ? '#ffd94a' : '#d64550'}; image-rendering:pixelated;">
    ${valHtml}
    ${isTouch ? '<div style="color:#8d99ae; font-weight:bold; font-size:12px; margin-top:4px">press &amp; hold the badge to save it. yes, really.</div>' : ''}
    <div style="margin-top:8px">${btns}</div>
    ${lbHtml}
    <div id="cpMsg" style="color:#7cffa5; font-weight:bold; min-height:20px; margin-top:4px"></div>
    ${isTouch ? '' : '<div style="color:#8d99ae; font-weight:bold; font-size:12px">or press R to run it back</div>'}`;
  ui.style.display = 'flex';

  const nameEl = document.getElementById('lbName');
  nameEl.onkeydown = e => e.stopPropagation();        // typing must not steer the game
  nameEl.onchange = () => {                           // commit the name -> re-stamp in place
    // no full rebuild: replacing the card mid-click would eat the POST button
    const nm = nameEl.value.toUpperCase().replace(/[^A-Z0-9 .-]/g, '').trim().slice(0, 14);
    try { localStorage.setItem('fm_name', nm); } catch(e){}
    surfaces.badge.c = makeBadge(won);
    surfaces.obit.c = makeObituary(won);
    surfaces.obit.text = `I made the front page of Hypergrowth Daily: '${obitHeadline(won)}'. Play: ${GAME_URL}`;
    for (const k in surfaces){
      const sf = surfaces[k];
      sf.url = sf.c.toDataURL('image/png');
      sf.c.toBlob(blob => { if (blob){
        if (sf.blobUrl) URL.revokeObjectURL(sf.blobUrl); // don't leak the previous stamp
        sf.blob = blob; sf.file = new File([blob], sf.fname, {type:'image/png'}); sf.blobUrl = URL.createObjectURL(blob);
      } }, 'image/png');
    }
    document.getElementById('endImg').src = surfaces[cur].url;
  };
  if (LB_ON){
    const listEl = document.getElementById('lbList');
    const renderTop = () => {
      lbLoad(5, (rows, label) => {
        listEl.innerHTML = label + (rows.length ? '<br>' + lbRowsHtml(rows) : '') +
          (rows.length ? '<br><button id="lbAll" class="alt" style="font-size:13px; padding:6px 12px; margin-top:4px">🏆 VIEW TOP 100</button>' : '');
        const all = document.getElementById('lbAll');
        if (all) all.onclick = () => lbLoad(100, (rows2, label2) => {
          listEl.innerHTML = label2 + ' · top ' + rows2.length +
            `<div style="max-height:220px; overflow:auto; margin:6px auto 0; width:min(520px,84vw); padding:6px 12px; background:rgba(0,0,0,.35); text-align:left">${lbRowsHtml(rows2)}</div>` +
            '<button id="lbLess" class="alt" style="font-size:13px; padding:6px 12px; margin-top:4px">show top 5 ↑</button>';
          document.getElementById('lbLess').onclick = () => renderTop();
          listEl.scrollIntoView({ block: 'nearest' }); // the expand must be SEEN (fold bug, owner report)
        });
      });
    };
    renderTop();
    document.getElementById('lbGo').onclick = () => {
      if (lbPostedRun === runId) return;                 // this run is already on the board
      const nm = (nameEl.value || 'YOU').toUpperCase().replace(/[^A-Z0-9 .-]/g, '').trim().slice(0, 14) || 'YOU';
      try { localStorage.setItem('fm_name', nm); } catch(e){}
      const btn = document.getElementById('lbGo');
      btn.textContent = '…syndicating…';
      fetch('/api/leaderboard', { method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ name: nm, val: lastVal, raised, timeMs: Math.round(endTime || playMs), won, seed: SEED_N }) })
        .then(r => r.json())
        .then(j => {
          btn.textContent = j && j.ok ? (j.kept === 'existing' ? 'your earlier run was better ✓' : '✓ ON THE BOARD')
                                      : (j && j.reason ? '✗ ' + j.reason : 'board offline (very pre-seed)');
          if (j && j.ok){
            lbPostedRun = runId;                         // marked only when the board confirms
            // bust the 60s CDN cache so the board under the checkmark shows the new row
            fetch('/api/leaderboard?seed=' + SEED_N + '&limit=10&b=' + Math.floor(Math.random() * 1e9))
              .then(r => r.json()).then(k => { if (k && k.ok){ lbTop = k.top; renderTop(); } }).catch(() => {});
          }
        })
        .catch(() => { btn.textContent = 'board offline (very pre-seed)'; });
    };
  }

  document.getElementById('bTg').onclick = () => {
    cur = cur === 'obit' ? 'badge' : 'obit';
    document.getElementById('endImg').src = surfaces[cur].url;
    document.getElementById('bDl').textContent = surfaces[cur].save;
    document.getElementById('bTg').textContent = cur === 'obit' ? 'view classic badge' : 'view front page';
  };
  if (canShareFiles) document.getElementById('bSh').onclick = () => {
    const s = surfaces[cur];
    // picture + the game link: some targets drop text when files ride along,
    // so the url field carries the link on its own
    const data = s.file && navigator.canShare({files:[s.file]})
      ? {files:[s.file], text:s.text, url: resultUrl(won)} : {text:s.text, url: resultUrl(won)};
    navigator.share(data).catch(() => navigator.share({text:s.text}).catch(()=>{}));
  };
  document.getElementById('bDl').onclick = () => {
    // one button, both halves of a LinkedIn post: the PNG downloads and the
    // post text lands on the clipboard in the same click
    const a = document.createElement('a');
    a.href = surfaces[cur].blobUrl || surfaces[cur].url; a.download = surfaces[cur].fname;
    document.body.appendChild(a); a.click(); a.remove();
    const msg = document.getElementById('cpMsg');
    const text = surfaces[cur].text;
    const badgeBlob = surfaces[cur].blob;
    const ok = () => msg.textContent = 'saved ✓ + post copied ✓ — paste on LinkedIn, attach the image';
    const manual = () => { // last resort: visible readonly textarea, still shippable
      msg.textContent = 'copy blocked — select all + copy manually:';
      const ta = document.createElement('textarea');
      ta.value = text; ta.readOnly = true;
      ta.style.cssText = 'display:block; margin:6px auto 0; width:min(480px,80vw); height:88px; font:12px "Courier New",monospace;';
      msg.appendChild(ta); ta.focus(); ta.select();
    };
    const legacy = () => {
      try {
        const ta = document.createElement('textarea');
        ta.value = text; ta.setAttribute('readonly',''); ta.style.cssText = 'position:fixed; left:-9999px';
        document.body.appendChild(ta); ta.select();
        const done = document.execCommand('copy'); ta.remove();
        done ? ok() : manual();
      } catch(err){ manual(); }
    };
    if (navigator.clipboard && navigator.clipboard.writeText){
      let rich = null; // desktop: try text + badge image in one clipboard write
      if (!isTouch && navigator.clipboard.write && window.ClipboardItem && badgeBlob){
        try { rich = navigator.clipboard.write([new ClipboardItem({'image/png':badgeBlob, 'text/plain':new Blob([text], {type:'text/plain'})})]); } catch(err){}
      }
      (rich || navigator.clipboard.writeText(text)).then(ok, () => navigator.clipboard.writeText(text).then(ok, legacy));
    } else legacy(); // insecure contexts / webviews: navigator.clipboard is undefined
  };
  document.getElementById('bRe').onclick = () => resumePlay(!won);
}

// ------------------------- MAIN LOOP -------------------------
// fixed timestep: 60 sim-steps/s regardless of display refresh (120Hz phones, throttled tabs)
const STEP = 1000 / 60;
let last = 0, acc = 0;
function stepGame(){
  if (state === ST.TITLE && (JUMP()) && frame > 30){
    track('start');
    document.getElementById('credit').style.display = 'none';
    document.getElementById('lbChip').style.display = 'none';
    document.getElementById('lbPanel').style.display = 'none';
    reset(false); state = ST.PLAY;
  }
  if (hitstopT > 0){ hitstopT--; return; } // hurt hitstop: freeze sim, keep drawing
  update();
}
function drawPause(){
  // drawn after draw() so it covers every scene, including the mini-game
  // full-frame branches that return early
  px(0, 0, W, H, 'rgba(8,8,20,.7)'); occlude(0, 0, W, H);
  cx.textAlign = 'center';
  cx.fillStyle = '#ffd94a'; cx.font = 'bold 16px monospace';
  cx.fillText('PAUSED', W/2, 118);
  cx.fillStyle = '#8d99ae'; cx.font = 'bold 8px monospace';
  cx.fillText('(the market, briefly, moves without you)', W/2, 134);
  cx.fillStyle = '#fff';
  cx.fillText(('ontouchstart' in window) ? 'tap ⏸ to resume' : 'ESC to resume', W/2, 150);
  cx.textAlign = 'left';
}
function loop(now){
  acc += Math.min(now - (last || now), 100); last = now;
  if (paused && state === ST.PLAY){ acc = 0; }
  else while (acc >= STEP){ stepGame(); acc -= STEP; }
  draw();
  if (paused && state === ST.PLAY) drawPause();
  requestAnimationFrame(loop);
}
reset(false);
state = ST.TITLE;
requestAnimationFrame(loop);
</script>
